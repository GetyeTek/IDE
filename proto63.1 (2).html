<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Academic AI Deck Builder</title>
    <style>
        :root {
            --bg: #020617; --surface: #0f172a; --surface-highlight: #1e293b;
            --text-main: #f8fafc; --text-muted: #94a3b8;
            --primary: #3b82f6; --primary-dim: rgba(59, 130, 246, 0.2);
            --success: #10b981; --warning: #f59e0b; --danger: #ef4444;
            --border: #334155;
        }
        body { background: var(--bg); color: var(--text-main); font-family: system-ui, sans-serif; margin: 0; padding: 0; padding-bottom: 80px; -webkit-tap-highlight-color: transparent; }
        .nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--surface); border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 12px 0; z-index: 100; box-shadow: 0 -4px 20px rgba(0,0,0,0.5); }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 10px; color: var(--text-muted); cursor: pointer; transition: 0.2s; }
        .nav-item.active { color: var(--primary); }
        .nav-icon { font-size: 20px; }
        .screen { display: none; padding: 20px; animation: fadein 0.3s; max-width: 800px; margin: 0 auto; }
        .screen.active { display: block; }
        @keyframes fadein { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        h1 { font-size: 1.5rem; margin: 0 0 20px 0; color: var(--primary); }
        h2 { font-size: 1rem; margin: 20px 0 10px 0; color: var(--text-muted); text-transform: uppercase; border-bottom: 1px solid var(--border); padding-bottom: 5px; }
        .list-group { display: flex; flex-direction: column; gap: 12px; }
        .item-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; transition: 0.2s; }
        .item-card:active { transform: scale(0.99); background: var(--surface-highlight); }
        .card-header { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
        .card-header .actions { display: flex; gap: 8px; }
        .item-title { font-weight: 600; font-size: 1rem; margin-bottom: 4px; line-height: 1.3; }
        .item-sub { color: var(--text-muted); font-size: 0.8rem; }
        .badge { font-size: 0.65rem; padding: 2px 6px; border-radius: 4px; font-weight: bold; text-transform: uppercase; display: inline-block; margin-right: 5px; }
        .badge.folder { background: var(--primary-dim); color: var(--primary); }
        .badge.file { background: #334155; color: #cbd5e1; }
        .badge.success { background: rgba(16, 185, 129, 0.2); color: var(--success); }
        .badge.processing { background: rgba(59, 130, 246, 0.2); color: var(--primary); }
        .badge.failed { background: rgba(239, 68, 68, 0.2); color: var(--danger); }
        .action-row { display: flex; gap: 10px; margin-top: 12px; }
        .btn { flex: 1; padding: 10px; border-radius: 8px; border: none; font-weight: 600; font-size: 0.85rem; cursor: pointer; text-align: center; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-muted); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .flashcard { background: var(--surface); border-radius: 16px; padding: 30px; min-height: 200px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; border: 1px solid var(--border); position: relative; cursor: pointer; margin: 20px 0; }
        .flashcard .fc-front { display: flex; flex-direction: column; align-items: center; }
        .flashcard.flipped .fc-front { display: none; }
        .flashcard.flipped .fc-back { display: flex; }
        .fc-back { display: none; flex-direction: column; align-items: center; }
        .fc-tag { position: absolute; top: 15px; right: 15px; background: var(--surface-highlight); font-size: 0.7rem; padding: 4px 8px; border-radius: 4px; color: var(--text-muted); }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 200; display: none; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; backdrop-filter: blur(5px); }
        .modal-content { background: var(--surface); padding: 25px; border-radius: 16px; width: 100%; max-width: 500px; border: 1px solid var(--border); }
        input, textarea { width: 100%; padding: 12px; background: #020617; border: 1px solid var(--border); color: white; border-radius: 8px; margin-bottom: 15px; box-sizing: border-box; font-family: monospace; }
        textarea { height: 300px; resize: vertical; font-size: 0.8rem; }
        .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: var(--success); color: white; padding: 10px 20px; border-radius: 30px; font-size: 0.9rem; font-weight: 600; opacity: 0; transition: 0.3s; pointer-events: none; z-index: 150; }
        .toast.show { opacity: 1; bottom: 90px; }
    </style>
</head>
<body>

    <div id="configModal" class="modal">
        <div class="modal-content">
            <h2>Setup Connection</h2>
            <input type="text" id="sbUrl" placeholder="Supabase URL">
            <input type="password" id="sbKey" placeholder="Anon Key">
            <button class="btn btn-primary" onclick="saveConfig()" style="width:100%">Connect</button>
        </div>
    </div>
    
    <div id="promptModal" class="modal">
        <div class="modal-content">
            <h2 id="prompt-modal-title">Edit Prompt Config</h2>
            <textarea id="promptJsonText" spellcheck="false" placeholder="Paste your prompt JSON here..."></textarea>
            <input type="hidden" id="promptBookName">
            <div class="action-row">
                <button class="btn btn-outline" onclick="pasteFromClipboard()">Paste</button>
                <button class="btn btn-primary" onclick="savePromptConfig()">Save to GitHub</button>
            </div>
            <button class="btn btn-outline" style="width:100%; margin-top:10px;" onclick="document.getElementById('promptModal').style.display='none'">Cancel</button>
        </div>
    </div>

    <div id="toast" class="toast">Action Successful</div>

    <div id="screen-sources" class="screen active">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h1>Library</h1>
            <button class="btn btn-outline" style="width:auto; padding:5px 10px;" onclick="refreshSources()">↻ Sync</button>
<div style="display:flex; justify-content:space-between; align-items:center;">
            <h1>Library</h1>
            <div style="display:flex; gap:10px;">
                <button class="btn btn-outline" style="width:auto; padding:5px 10px;" onclick="toggleTheme()">🌓 Theme</button>
                <button class="btn btn-outline" style="width:auto; padding:5px 10px;" onclick="refreshSources()">↻ Sync</button>
            </div>
        </div>
        <div id="breadcrumb" style="color:var(--primary); font-family:monospace; margin-bottom:10px;">books/</div>
        <div id="source-list" class="list-group"></div>
    </div>

    <div id="screen-results" class="screen">
        <h1>My Decks</h1>
        <div id="deck-list" class="list-group"></div>
    </div>

    <div id="screen-queue" class="screen">
        <h1>Processing Queue</h1>
        <div class="item-card" style="text-align:center; background:var(--surface-highlight); border:none;">
            <div style="font-size:2rem; margin-bottom:10px;">⚡</div>
            <div class="item-title">AI Processor</div>
            <button class="btn btn-primary" style="margin-top:15px; width:100%;" onclick="triggerLoop()">Manually Trigger Worker</button>
            <div id="loop-log" style="margin-top:10px; font-family:monospace; font-size:0.8rem; color:var(--success); min-height:20px;">Ready</div>
        </div>
        <h2 style="border:none; margin-top: 30px;">Active Jobs</h2>
        <div id="job-list" class="list-group"></div>
    </div>

    <div id="screen-viewer" class="screen">
        <button class="btn btn-outline" onclick="nav('results')" style="margin-bottom:15px;">← Back to Decks</button>
        <h1 id="view-title" style="font-size:1.2rem; margin-bottom:5px;">Deck Title</h1>
        <div id="flashcard-area"></div>
        <div class="action-row">
            <button class="btn btn-outline" onclick="prevCard()">Previous</button>
            <button class="btn btn-primary" onclick="nextCard()">Next Card</button>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="nav('sources')" id="nav-sources"><span class="nav-icon">📚</span>Source</div>
        <div class="nav-item" onclick="nav('results')" id="nav-results"><span class="nav-icon">🎓</span>Learn</div>
        <div class="nav-item" onclick="nav('queue')" id="nav-queue"><span class="nav-icon">⚙️</span>Queue</div>
    </div>

<script>
    let currentPath = 'books';
    let currentDeck = [];
    let cardIndex = 0;
    const CONFIG = { url: localStorage.getItem('sbUrl'), key: localStorage.getItem('sbKey') };

    window.onload = () => {
        if (!CONFIG.url || !CONFIG.key) document.getElementById('configModal').style.display = 'flex';
        else nav('sources');
    };

    function saveConfig() {
        let url = document.getElementById('sbUrl').value.replace(/\/$/, "");
        const key = document.getElementById('sbKey').value;
        if(url && key) { localStorage.setItem('sbUrl', url); localStorage.setItem('sbKey', key); location.reload(); }
    }

    function nav(screen) {
        document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
        document.getElementById('screen-' + screen).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        if(document.getElementById('nav-'+screen)) document.getElementById('nav-'+screen).classList.add('active');
        
        if(screen === 'sources') refreshSources();
        if(screen === 'results') loadDecks();
        if(screen === 'queue') loadJobs();
    }

    function toast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg; t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2000);
    }

    async function sbFetch(path, options = {}) {
        const res = await fetch(`${CONFIG.url}${path}`, {
            ...options,
            headers: { 'apikey': CONFIG.key, 'Authorization': `Bearer ${CONFIG.key}`, 'Content-Type': 'application/json', 'Prefer': 'return=representation', ...options.headers }
        });
        if (res.status === 204) return null;
        if (!res.ok) throw new Error((await res.text()));
        return await res.json();
    }
    
    // --- *** API (CORRECTED) *** ---
    async function edgeFetch(body) {
        const res = await fetch(`${CONFIG.url}/functions/v1/ai-academic-processor`, {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${CONFIG.key}`, 'Content-Type': 'application/json' },
            body: JSON.stringify(body) // Simplified: always stringify the object passed in
        });
        if (!res.ok) throw new Error((await res.text()));
        return await res.json();
    }

    async function refreshSources() {
        const list = document.getElementById('source-list');
        list.innerHTML = '<div style="text-align:center; color:#64748b; padding:20px;">Loading...</div>';
        
        try {
            const [ghFiles, dbJobs] = await Promise.all([
                edgeFetch({ 'x-action': 'github_proxy', payload: { method: 'GET', path: currentPath } }),
                sbFetch('/rest/v1/chapter_processing_jobs?select=storage_path')
            ]);

            const registeredSet = new Set(dbJobs.map(j => j.storage_path));
            list.innerHTML = '';

            if(currentPath !== 'books') {
                const up = currentPath.substring(0, currentPath.lastIndexOf('/')) || 'books';
                list.innerHTML += `<div class="item-card" onclick="currentPath='${up}'; refreshSources();" style="text-align:center; padding:10px; cursor:pointer;">⬆ Back</div>`;
            }
            document.getElementById('breadcrumb').innerText = currentPath + '/';

            if(Array.isArray(ghFiles)) {
                ghFiles.sort((a,b) => (a.type === b.type ? 0 : a.type === 'dir' ? -1 : 1));
                ghFiles.forEach(item => {
                    const isFolder = item.type === 'dir';
                    const isReg = registeredSet.has(item.path);
                    const cleanName = item.name.replace(/_/g, ' ').replace('.txt','');

                    list.innerHTML += `
                    <div class="item-card" style="${isReg ? 'border-color:var(--success);' : ''}">
                        <div class="card-header">
                            <div>
                                <div class="item-title">${cleanName}</div>
                                <span class="badge ${isFolder ? 'folder' : 'file'}">${isFolder ? 'Folder' : 'Chapter'}</span>
                                ${isReg ? '<span class="badge success">Registered</span>' : ''}
                            </div>
                            <div class="actions">
                                ${isFolder ? `<button class="btn btn-outline" style="width:auto; padding:4px 8px; font-size:0.7rem;" onclick="openPromptEditor('${item.name}')">📝 Config</button>` : ''}
                                ${isFolder ? `<button class="btn btn-primary" style="width:auto; padding:4px 8px; font-size:0.7rem;" onclick="regFolder('${item.path}')">Add All</button>` : ''}
                            </div>
                        </div>
                        <div class="action-row">
                            ${isFolder 
                                ? `<button class="btn btn-outline" onclick="currentPath='${item.path}'; refreshSources();">Open Folder</button>`
                                : (isReg ? `<button class="btn btn-outline" disabled>Already Added</button>` 
                                         : `<button class="btn btn-primary" onclick="regFile('${item.path}')">Register Job</button>`)
                            }
                        </div>
                    </div>`;
                });
            } else {
                list.innerHTML = '<div style="text-align:center; padding:20px;">Empty Folder</div>';
            }
        } catch(e) { list.innerHTML = `<div style="color:var(--danger)">Error: ${e.message}</div>`; }
    }

    async function regFile(path) {
        const parts = path.split('/');
        const book = parts.length > 1 ? parts[parts.length-2].replace(/_/g,' ') : "Book";
        const chap = parts[parts.length-1].replace('.txt','').replace(/_/g,' ');
        
        try {
            await sbFetch('/rest/v1/chapter_processing_jobs', { method: 'POST', body: JSON.stringify({ book_title: book, chapter_title: chap, storage_path: path, status: 'pending' }) });
            toast("Registered!"); refreshSources();
        } catch(e) { alert(e.message); }
    }

    async function regFolder(path) {
        if(!confirm("Register all unregistered chapters in this folder?")) return;
        try {
            const files = await edgeFetch({ 'x-action': 'github_proxy', payload: { method: 'GET', path: path } });
            const existing = await sbFetch('/rest/v1/chapter_processing_jobs?select=storage_path');
            const existSet = new Set(existing.map(j => j.storage_path));
            
            const jobs = files.filter(f => f.type === 'file' && !existSet.has(f.path)).map(f => ({
                book_title: path.split('/').pop().replace(/_/g,' '),
                chapter_title: f.name.replace('.txt','').replace(/_/g,' '),
                storage_path: f.path, status: 'pending'
            }));

            if(jobs.length === 0) return toast("All already registered");
            await sbFetch('/rest/v1/chapter_processing_jobs', { method: 'POST', body: JSON.stringify(jobs) });
            toast(`Added ${jobs.length} Jobs`); refreshSources();
        } catch(e) { alert(e.message); }
    }

    async function openPromptEditor(bookName) {
        const modal = document.getElementById('promptModal');
        const title = document.getElementById('prompt-modal-title');
        const textarea = document.getElementById('promptJsonText');
        
        title.innerText = `Config for ${bookName.replace(/_/g, ' ')}`;
        document.getElementById('promptBookName').value = bookName;
        modal.dataset.fileSha = ''; 
        textarea.value = 'Loading existing config...';
        modal.style.display = 'flex';

        try {
            const data = await edgeFetch({ 'x-action': 'github_proxy', payload: { method: 'GET', path: `Prompts/${bookName}.json` } });
            if(data && data.content) {
                const decodedContent = atob(data.content);
                textarea.value = JSON.stringify(JSON.parse(decodedContent), null, 2);
                modal.dataset.fileSha = data.sha;
            } else {
                 throw new Error("File not found");
            }
        } catch (e) {
            const template = {
                book_title: bookName.replace(/_/g, ' '),
                chapters: { "ch-1": [ { title: "Deck Title 1", card_count: 15, instruction: "Instruction for deck 1." } ] }
            };
            textarea.value = JSON.stringify(template, null, 2);
        }
    }

    async function pasteFromClipboard() {
        try {
            const text = await navigator.clipboard.readText();
            document.getElementById('promptJsonText').value = text;
            toast("Pasted from clipboard!");
        } catch (err) { alert('Failed to read clipboard contents.'); }
    }
    
    // --- *** PROMPT SAVE (CORRECTED) *** ---
    async function savePromptConfig() {
        const modal = document.getElementById('promptModal');
        const bookName = document.getElementById('promptBookName').value;
        const fileSha = modal.dataset.fileSha || undefined;
        const textarea = document.getElementById('promptJsonText');
        
        let config;
        try { config = JSON.parse(textarea.value); } 
        catch (e) { alert("Error: Invalid JSON format."); return; }

        config.book_title = bookName.replace(/_/g, ' ');
        const finalContent = JSON.stringify(config, null, 2);
        const encodedContent = btoa(unescape(encodeURIComponent(finalContent)));

        try {
            // Build the entire request object for edgeFetch
            const requestPayload = {
                'x-action': 'github_proxy',
                payload: {
                    method: 'PUT',
                    path: `Prompts/${bookName}.json`,
                    body: { // This is now an object, not a string
                        message: `[UI] Update config for ${bookName}`,
                        content: encodedContent,
                        sha: fileSha
                    }
                }
            };

            await edgeFetch(requestPayload);

            toast("Config saved to GitHub!");
            modal.style.display = 'none';
        } catch (e) {
            alert(`Failed to save to GitHub: ${e.message}`);
        }
    }

    async function loadJobs() {
        const list = document.getElementById('job-list');
        try {
            const jobs = await sbFetch('/rest/v1/chapter_processing_jobs?status=not.in.(completed)&order=updated_at.desc');
            list.innerHTML = jobs.length === 0 ? '<div style="text-align:center; color:var(--text-muted)">No active jobs</div>' : '';
            
            jobs.forEach(j => {
                let statusColor = j.status === 'failed' ? 'var(--danger)' : j.status === 'pending' ? 'var(--warning)' : 'var(--primary)';
                if(j.status === 'completed') statusColor = 'var(--success)';

                list.innerHTML += `
                <div class="item-card" style="border-left:4px solid ${statusColor}">
                    <div class="card-header">
                        <div>
                            <div class="item-title">${j.chapter_title}</div>
                            <div class="item-sub">${j.book_title}</div>
                        </div>
                        <span class="badge" style="background-color: transparent; border: 1px solid ${statusColor}; color:${statusColor}">${j.status}</span>
                    </div>
                    <div class="item-sub" style="margin-top:8px; font-size: 0.7rem;">Decks: <b>${(j.generated_history||[]).length}</b> &nbsp;&nbsp; Attempts: <b>${j.attempt_count || 0}/5</b></div>
                    ${j.error_message ? `<div style="color:var(--danger); font-size:0.8rem; margin-top:8px; background: rgba(239, 68, 68, 0.1); padding: 5px 8px; border-radius: 4px;">${j.error_message}</div>` : ''}
                </div>`;
            });
        } catch(e) { list.innerHTML = "Error loading jobs: " + e.message; }
    }

    async function triggerLoop() {
        const log = document.getElementById('loop-log');
        const btn = document.querySelector('#screen-queue button');
        log.innerText = `Pinging the worker...`;
        btn.disabled = true;

        try {
            const res = await edgeFetch({}); // Empty body for worker trigger
            log.style.color = 'var(--success)';
            log.innerText = `Worker Response: ${res.message}`;
            toast("Worker cycle complete!");
            loadJobs();
        } catch (e) {
            log.style.color = 'var(--danger)';
            log.innerText = "Error: " + (JSON.parse(e.message)?.error || e.message);
        } finally {
            btn.disabled = false;
        }
    }

    async function loadDecks() {
        const list = document.getElementById('deck-list');
        try {
            const decks = await sbFetch('/rest/v1/published_decks?select=*&order=created_at.desc');
            list.innerHTML = '';
            if(decks.length === 0) { list.innerHTML = '<div style="text-align:center; color:var(--text-muted)">No decks yet</div>'; return; }
            
            const grouped = decks.reduce((acc, d) => {
                const book = d.source_document.split('/')[1]?.replace(/_/g,' ') || "Misc";
                if (!acc[book]) acc[book] = [];
                acc[book].push(d);
                return acc;
            }, {});

            for(const [book, ds] of Object.entries(grouped).sort((a,b) => a[0].localeCompare(b[0]))) {
                list.innerHTML += `<h2>${book}</h2>`;
                ds.forEach(d => {
                    list.innerHTML += `
                    <div class="item-card" onclick="openDeck('${d.id}')">
                        <div class="card-header">
                            <div class="item-title">${d.title}</div>
                            <span class="badge success">${d.card_count} cards</span>
                        </div>
                        <div class="item-sub">${d.description || ''}</div>
                    </div>`;
                });
            }
        } catch(e) { list.innerHTML = "Error loading decks"; }
    }

    async function openDeck(id) {
        const [d] = await sbFetch(`/rest/v1/published_decks?id=eq.${id}&select=*`);
        if (!d) { alert("Could not load deck."); return; }
        currentDeck = d.cards; cardIndex = 0;
        document.getElementById('view-title').innerText = d.title;
        nav('viewer'); renderCard();
    }

    function renderCard() {
        if (!currentDeck || currentDeck.length === 0) return;
        const c = currentDeck[cardIndex];
        const area = document.getElementById('flashcard-area');
        if (!c) { area.innerHTML = `<div>Card data is missing for index ${cardIndex}.</div>`; return; }

        let f="", b="", h= (c.type || "basic").toUpperCase();
        if(c.type === 'basic') { f=c.front; b=c.back; }
        else if(c.type === 'cloze') { f=(c.text || c.front || '').replace(/\{\{c1::(.*?)\}\}/g, "___"); b=(c.text || c.front || '').replace(/\{\{c1::(.*?)\}\}/g, "<b style='color:var(--success)'>$1</b>"); }
        else if(c.type === 'list') { f=c.question || c.front; b=`<ul style="text-align:left; padding-left:20px;">${(c.items||c.back||[]).map(i=>`<li>${i}</li>`).join('')}</ul>`; }
        else { f=c.front || "Unknown"; b=c.back || "No answer"; }

        area.innerHTML = `
        <div class="flashcard" onclick="this.classList.toggle('flipped')">
            <div class="fc-front"><div class="fc-tag">${h}</div><div style="font-size:1.1rem;">${f}</div><div style="margin-top:20px; font-size:0.7rem; color:var(--text-muted);">(Tap to flip)</div></div>
            <div class="fc-back"><div>${b}</div>${c.metadata?.page_number ? `<div style="margin-top:15px; font-size:0.7rem; color:var(--primary);">Pg ${c.metadata.page_number}</div>` : ''}</div>
        </div>
        <div style="text-align:center; font-size:0.8rem;">${cardIndex+1} / ${currentDeck.length}</div>`;
    }
    function nextCard() { if(cardIndex < currentDeck.length-1) { cardIndex++; renderCard(); } }
    function prevCard() { if(cardIndex > 0) { cardIndex--; renderCard(); } }
</script>
</body>
</html>
