<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost Protocol Master</title>
    <style>
        :root { --glow: #0f0; --bg: #000; }
        body { background: var(--bg); color: var(--glow); font-family: 'Courier New', monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Layout */
        #header { padding: 10px; border-bottom: 1px solid #030; display: flex; justify-content: space-between; font-size: 12px; }
        #view { flex: 1; overflow-y: auto; padding: 15px; white-space: pre-wrap; word-break: break-all; background: radial-gradient(circle, #050505 0%, #000 100%); }
        #input-area { padding: 10px; border-top: 1px solid #030; background: #080808; }
        
        /* Elements */
        #msg-in { background: transparent; border: 1px solid #030; color: #fff; width: 100%; padding: 12px; outline: none; font-family: monospace; }
        #msg-in:focus { border-color: var(--glow); }
        .stats { font-size: 9px; color: #060; margin-top: 5px; text-transform: uppercase; letter-spacing: 1px; }
        
        /* Visuals */
        .token { color: #fff; font-weight: bold; border-bottom: 1px dotted #555; }
        .img-pixel { display: inline-block; width: 4px; height: 4px; }
        .meta { color: #040; font-size: 10px; }
        button { background: #020; color: #0f0; border: 1px solid #0f0; font-size: 10px; cursor: pointer; padding: 2px 5px; }
    </style>
</head>
<body>

<div id="header">
    <span>GHOST-PROTOCOL v4.0 (STABLE)</span>
    <span id="conn-status">SIGNAL: ACTIVE</span>
</div>

<div id="view">-- ENCRYPTED CHANNEL ESTABLISHED --<br></div>

<div id="input-area">
    <div style="display:flex; gap:10px; margin-bottom:5px;">
        <input id="msg-in" autofocus placeholder="Type message..." autocomplete="off">
        <input type="file" id="img-in" accept="image/*" style="display:none">
        <button onclick="document.getElementById('img-in').click()">📷 IMG</button>
    </div>
    <div class="stats">
        DATA SAVED: <span id="saved">0%</span> | 
        PATH: <span id="path-active">IDLE</span> | 
        THROUGHPUT: <span id="tput">0</span>b
    </div>
</div>

<script type="module">
    const GHOST_URL = 'https://xvldfsmxskhemkslsbym.supabase.co/functions/v1/ghost-handler';
    const AUTH_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh2bGRmc214c2toZW1rc2xzYnltIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjI2ODgxNzksImV4cCI6MjA3ODI2NDE3OX0.5arqrx8Tt7v-hpXpo_ncoK4IX8th9IibxAuv93SSoOU';

    const DICT = [" the "," be "," to "," of "," and "," a "," in "," that "," have "," I "," it "," for "," not "," on "," with "," he "," as "," you "," do "," at "," this "," but "," his "," by "," from "," they "," we "," say "," her "," she "," or "," an "," will "," my "," one "," all "," would "," there "," their "," what "," so "," up "," out "," if "," about "," who "," get "," which "," go "," me ","hello","how","are","doing","today","thanks","good","where","home","night","busy","talk","later"];
    const uid = Math.floor(Math.random() * 999);
    const view = document.getElementById('view');
    const msgIn = document.getElementById('msg-in');
    const imgIn = document.getElementById('img-in');

    async function ghostSend(payload, isText = true) {
        let bytes = [];
        if(isText) {
            payload.split(' ').forEach(word => {
                let idx = DICT.indexOf(word.toLowerCase().trim());
                if(idx !== -1) bytes.push(128 + idx);
                else [...word].forEach(c => bytes.push(c.charCodeAt(0)));
                bytes.push(32);
            });
            bytes.push(13);
        } else { bytes = payload; }

        await fetch(GHOST_URL, {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${AUTH_KEY}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'dispatch', payload: bytes, uid })
        });
    }

    async function sip() {
        try {
            const res = await fetch(GHOST_URL, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${AUTH_KEY}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'sip', uid })
            });
            const body = await res.json();
            if(body.data) body.data.forEach(row => renderByte(row.b));
        } catch(e) {}
        setTimeout(sip, 2000);
    }

    let imgBuffer = null;
    function renderByte(b) {
        if(b === 127) { imgBuffer = []; return; }
        if(imgBuffer !== null) {
            imgBuffer.push(b);
            if(imgBuffer.length === 1024) {
                const canvas = document.createElement('canvas');
                canvas.width = 32; canvas.height = 32;
                canvas.style.imageRendering = 'pixelated';
                canvas.style.width = '128px';
                const ctx = canvas.getContext('2d');
                imgBuffer.forEach((px, i) => {
                    ctx.fillStyle = px === 1 ? '#fff' : '#000';
                    ctx.fillRect(i % 32, Math.floor(i / 32), 1, 1);
                });
                view.appendChild(canvas);
                imgBuffer = null;
            }
            return;
        }

        let html = b >= 128 ? `<span class="token">${DICT[b-128]}</span>` : (b === 13 ? "<br>" : String.fromCharCode(b));
        const span = document.createElement('span');
        span.innerHTML = html;
        view.appendChild(span);
        view.scrollTop = view.scrollHeight;
    }

    imgIn.onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (event) => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = 32; canvas.height = 32;
                ctx.drawImage(img, 0, 0, 32, 32);
                const data = ctx.getImageData(0,0,32,32).data;
                let bytes = [127];
                for(let i=0; i<data.length; i+=4) bytes.push(((data[i]+data[i+1]+data[i+2])/3) > 128 ? 1 : 0);
                ghostSend(bytes, false);
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    msgIn.onkeydown = (e) => { if(e.key === 'Enter') { ghostSend(msgIn.value); msgIn.value = ''; } };
    sip();
</script>
</body>
</html>
