name: Amharic Chunk Refinery (v2.0)

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch: {}

concurrency:
  group: chunk-refinery-chain
  cancel-in-progress: false

jobs:
  refine:
    strategy:
      matrix:
        worker_id: [1, 2, 3, 4]
      fail-fast: false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x
      - name: Run Chunk Refinery
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          WORKER_ID: chunk_worker_${{ matrix.worker_id }}
        run: deno run -A worker/chunk_refinery.ts
      - name: Trigger Next Run
        if: success() && matrix.worker_id == 1
        env:
          GH_TOKEN: ${{ secrets.MY_PAT }}
        run: gh workflow run chunk_refine.yml