name: Aggregate Pinecone Vectors

on:
  # Run this action every hour
  schedule:
    - cron: '0 * * * *'
  
  # Allow running this action manually from the Actions tab
  workflow_dispatch:

jobs:
  aggregate:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x

      - name: Run Aggregation Script
        # These secrets must be set in your repository's settings
        # Go to Settings -> Secrets and variables -> Actions -> New repository secret
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
          PINECONE_INDEX_HOST: ${{ secrets.PINECONE_INDEX_HOST }} # e.g., your-index-xxxx.svc.us-west1-gcp.pinecone.io
        run: deno run --allow-net --allow-env source/aggregate.ts
