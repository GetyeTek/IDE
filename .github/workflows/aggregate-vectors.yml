name: Aggregate Pinecone Vectors

on:
  # Run this action every hour
  schedule:
    - cron: '0 * * * *'
  
  # Allow running this action manually FROM THE GITHUB UI
  workflow_dispatch:
    inputs:
      triggered_by:
        description: 'Who triggered this workflow?'
        required: false
        default: 'schedule'
      message:
        description: 'Optional message from trigger'
        required: false

jobs:
  aggregate:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x

      - name: Log Trigger Info (Optional)
        run: |
          echo "Workflow triggered by: ${{ github.event.inputs.triggered_by || 'schedule' }}"
          echo "Message: ${{ github.event.inputs.message || 'No message' }}"

      - name: Run Aggregation Script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
          PINECONE_INDEX_HOST: ${{ secrets.PINECONE_INDEX_HOST }}
        run: deno run --allow-net --allow-env source/aggregate.ts
