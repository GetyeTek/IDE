<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ultimate PDF Manufacturer</title>
    <style>
        :root {
            --pdf-width: 794px;
            --pdf-height: 1123px;
            --grey-bg: #d9d9d9;
            --font-serif: 'Times New Roman', Times, serif;
        }

        body {
            background-color: #2c2c2c;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: sans-serif;
        }

        /* Mobile Input Interface */
        #ui-layer {
            width: 100%;
            background: #1a1a1a;
            padding: 10px;
            box-sizing: border-box;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 2px solid #007bff;
        }

        textarea {
            width: 100%;
            height: 80px;
            background: #000;
            color: #00ff41;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            border: 1px solid #333;
            padding: 8px;
            border-radius: 4px;
        }

        button {
            width: 100%;
            margin-top: 8px;
            padding: 12px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            font-size: 16px;
        }

        /* THE PAGE CANVAS */
        .page-wrapper {
            width: 100%;
            display: flex;
            justify-content: center;
            overflow: hidden;
        }
        .page-canvas {
            background-color: white;
            width: var(--pdf-width);
            height: var(--pdf-height);
            /* Increased bottom padding to 100px to prevent content-footer collision */
            padding: 60px 70px 100px 70px; 
            box-sizing: border-box;
            position: relative;
            box-shadow: 0 0 30px rgba(0,0,0,0.2);
            font-family: var(--font-serif);
            color: #000;
            overflow: hidden;
            page-break-after: always;
            transform-origin: top center;
            flex-shrink: 0;
        }

        /* READER MODE OVERRIDES */
        body.viewer-active {
            background-color: #1a1a1a !important;
            padding-top: 0 !important;
        }
        body.viewer-active #ui-layer {
            display: none !important;
        }
        body.viewer-active .page-wrapper {
            margin-bottom: 20px;
        }
        body.viewer-active .page-canvas {
            box-shadow: 0 0 50px #000;
            border: none;
        }
        body.viewer-active #exit-viewer {
            display: flex !important;
        }
        body.viewer-active #magnify-toggle {
            display: none;
        }

        /* UI CONTROLS */
        #magnify-toggle {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            background: #007bff;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            z-index: 2000;
            font-size: 24px;
        }
        #exit-viewer {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            display: none;
            z-index: 3000;
            font-weight: bold;
            border: 1px solid rgba(255,255,255,0.3);
            backdrop-filter: blur(5px);
        }

        /* DIAGRAM STYLES */
        .graphic-container { flex-direction: column; align-items: center; padding: 20px 0; }
        .graphic-caption { font-size: 13px; font-style: italic; margin-top: 10px; color: #444; }
        svg { max-width: 100%; height: auto; }

        @media print {
            body { background: none; }
            #ui-layer { display: none; }
            .page-canvas { margin: 0; box-shadow: none; }
        }

        /* COMPONENT DEFINITIONS */
        .p-block { text-align: justify; margin-bottom: 14px; font-size: 15.5px; line-height: 1.5; }
        .h-block { font-weight: bold; font-size: 18px; margin: 25px 0 12px 0; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .p-block { text-align: justify; margin-bottom: 8px; font-size: 14.5px; line-height: 1.4; text-justify: inter-word; }
        
        /* ACADEMIC CALLOUT BLOCKS */
        .reflection-block {
            border: 1px solid #666;
            padding: 12px 15px;
            margin: 15px 0;
        }
        .reflection-label {
            font-weight: bold;
            text-decoration: underline;
            display: block;
            margin-bottom: 5px;
            font-size: 15px;
        }

        .brainstorming-block {
            background: #eee;
            border: 1px solid #000;
            padding: 10px 15px;
            margin: 15px 0;
        }

        /* LIST STYLES */
        .list-block { padding-left: 25px; margin: 10px 0; }
        .list-block ul, .list-block ol { padding: 0; margin: 0; }
        .list-block li { margin-bottom: 4px; text-align: justify; font-size: 14.5px; line-height: 1.3; }


        
        .box-block { 
            background: var(--grey-bg); 
            border: 1px solid #000; 
            padding: 10px 15px; 
            margin: 15px 0; 
        }
        .box-block ul { margin: 0; padding-left: 20px; font-weight: bold; font-style: italic; }

        .list-block { padding-left: 40px; margin-bottom: 15px; }
        .list-block li { margin-bottom: 8px; text-align: justify; font-size: 15.5px; }

        /* The Graphic/SVG Container */
        .graphic-container {
            width: 100%;
            display: flex;
            justify-content: center;
            margin: 15px 0;
        }

        /* Raster/Image Placeholder */
        .canvas-placeholder {
            border: 2px dashed #999;
            background: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 20px 0;
        }

        /* Table Rendering */
        table { width: 100%; border-collapse: collapse; margin: 15px 0; font-size: 14px; }
        th, td { border: 1px solid #000; padding: 6px; text-align: left; }
        th { background: #eee; }

        .footer {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            z-index: 10;
            font-size: 14px;
        }

        center { display: block; width: 100%; margin: 5px 0; }

        /* TABLE OF CONTENTS STYLES */
        .toc-container { margin: 10px 0; }
        .toc-entry {
            display: flex;
            align-items: flex-end;
            margin-bottom: 4px;
            font-size: 14.5px;
        }
        .toc-text { flex-shrink: 0; }
        .toc-dots {
            flex-grow: 1;
            border-bottom: 1.5px dotted #000;
            margin: 0 5px 4px 5px;
        }
        .toc-page { flex-shrink: 0; font-weight: bold; }

        /* Indentation Levels */
        .level-0 { font-weight: bold; margin-top: 10px; }
        .level-1 { padding-left: 20px; }
        .level-2 { padding-left: 40px; }
        .level-3 { padding-left: 60px; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <textarea id="json-pen" placeholder="Paste JSON instructions..."></textarea>
        <button onclick="draw()">EXECUTE DRAW COMMAND</button>
    </div>

    <div id="exit-viewer" onclick="toggleViewer()">← EXIT READER</div>
    <div id="magnify-toggle" onclick="toggleViewer()">🔍</div>
    <div id="document-container"></div>

    <script>
        function draw() {
            const raw = document.getElementById('json-pen').value;
            const container = document.getElementById('document-container');
            
            try {
                const doc = JSON.parse(raw);
                container.innerHTML = '';

                // Calculate scale factor to fit width
                const availableWidth = window.innerWidth - 20;
                const scale = availableWidth < 794 ? availableWidth / 794 : 1;

                Object.keys(doc).forEach(pageKey => {
                    const pageData = doc[pageKey];
                    
                    const wrapper = document.createElement('div');
                    wrapper.className = 'page-wrapper';
                    wrapper.style.height = (1123 * scale) + 'px';
                    wrapper.style.marginTop = '20px';

                    const pageDiv = document.createElement('div');
                    pageDiv.className = 'page-canvas';
                    pageDiv.style.transform = `scale(${scale})`;
                    pageDiv.id = `page-${pageKey}`;

                    pageData.content.forEach(item => {
                        const element = document.createElement('div');
                        
                        if (item.type === 'paragraph') {
                            element.className = 'p-block';
                            element.innerHTML = item.body;
                        } 
                        else if (item.type === 'header') {
                            element.className = 'h-block';
                            element.innerHTML = item.body;
                        }
                        else if (item.type === 'box') {
                            element.className = 'box-block';
                            let list = '<ul>';
                            item.items.forEach(li => list += `<li>${li}</li>`);
                            element.innerHTML = list + '</ul>';
                        }
                        else if (item.type === 'list') {
                            element.className = 'list-block';
                            let list = '<ul>';
                            item.items.forEach(li => list += `<li>${li}</li>`);
                            element.innerHTML = list + '</ul>';
                        }
                        else if (item.type === 'graphic') {
                            element.className = 'graphic-container';
                            element.innerHTML = `${item.svgCode}${item.caption ? `<div class="graphic-caption">${item.caption}</div>` : ''}`;
                        }
                        else if (item.type === 'canvas') {
                            element.className = 'canvas-placeholder';
                            element.style.width = item.w || '100%';
                            element.style.height = item.h || '200px';
                            element.innerText = `[ RASTER IMAGE: ${item.label || 'Empty'} ]`;
                        }
                        else if (item.type === 'table') {
                            let t = '<table>';
                            item.rows.forEach(row => {
                                t += '<tr>';
                                row.forEach(cell => t += `<td>${cell}</td>`);
                                t += '</tr>';
                            });
                            element.innerHTML = t + '</table>';
                        }
                        else if (item.type === 'footer') {
                            element.className = 'footer';
                            element.innerText = item.val;
                        }
                        else if (item.type === 'reflection') {
                            element.className = 'reflection-block';
                            element.innerHTML = `<span class="reflection-label">Reflection</span>${item.body}`;
                        }
                        else if (item.type === 'brainstorming') {
                            element.className = 'brainstorming-block';
                            element.innerHTML = `<b>Brainstorming Questions</b><br>${item.body}`;
                        }
                        else if (item.type === 'numbered-list') {
                            element.className = 'list-block';
                            let list = '<ol>';
                            item.items.forEach(li => list += `<li>${li}</li>`);
                            element.innerHTML = list + '</ol>';
                        }
                        else if (item.type === 'bullet-list') {
                            element.className = 'list-block';
                            let list = '<ul>';
                            item.items.forEach(li => list += `<li>${li}</li>`);
                            element.innerHTML = list + '</ul>';
                        }
                        else if (item.type === 'toc') {
                            element.className = 'toc-container';
                            item.entries.forEach(entry => {
                                const row = document.createElement('div');
                                row.className = `toc-entry level-${entry.level || 0}`;
                                row.innerHTML = `
                                    <span class="toc-text">${entry.text}</span>
                                    <span class="toc-dots"></span>
                                    <span class="toc-page">${entry.page}</span>
                                `;
                                element.appendChild(row);
                            });
                        }

                        pageDiv.appendChild(element);
                    });

                    wrapper.appendChild(pageDiv);
                    container.appendChild(wrapper);
                });

                window.scrollTo({ top: window.innerHeight * 0.4, behavior: 'smooth' });

            } catch (err) {
                alert("JSON Logic Error: " + err);
                console.error(err);
            }
        }

        function toggleViewer() {
            document.body.classList.toggle('viewer-active');
            // Re-draw to adjust scaling for potential orientation changes
            draw();
            if (document.body.classList.contains('viewer-active')) {
                window.scrollTo({ top: 0, behavior: 'auto' });
            }
        }
    </script>
</body>
</html>
