<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Conduit Commander</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --card-bg: #151517;
            --input-bg: #0a0a0a;
            --primary: #3b82f6;
            --dev: #eab308;
            --prod: #22c55e;
            --danger: #ef4444;
            --text-main: #ffffff;
            --text-muted: #a1a1aa;
            --border: #27272a;
            --nav-height: 80px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            margin: 0; padding: 0; height: 100vh;
            background-color: var(--bg); color: var(--text-main);
            font-family: 'Inter', sans-serif;
            display: flex; flex-direction: column;
        }

        /* --- Layout --- */
        .main-view {
            flex: 1; overflow-y: auto; padding: 20px;
            padding-bottom: calc(var(--nav-height) + 20px);
        }
        
        .tab-content { display: none; animation: fadeUp 0.2s ease-out; }
        .tab-content.active { display: block; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* --- Components --- */
        .header { font-size: 24px; font-weight: 700; margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; }
        
        .card {
            background: var(--card-bg); border: 1px solid var(--border);
            border-radius: 16px; padding: 16px; margin-bottom: 16px;
        }

        .btn {
            width: 100%; padding: 16px; border-radius: 12px; border: none;
            font-weight: 600; font-size: 16px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            color: white; transition: opacity 0.2s;
        }
        .btn:active { opacity: 0.7; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-primary { background: var(--primary); }
        .btn-dev { background: var(--dev); color: black; }
        .btn-prod { background: var(--prod); }
        .btn-danger { background: var(--danger); }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-muted); }

        .input-group { margin-bottom: 16px; }
        .input-label { display: block; color: var(--text-muted); font-size: 12px; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        .input-field {
            width: 100%; background: var(--input-bg); border: 1px solid var(--border);
            color: var(--text-main); padding: 14px; border-radius: 10px;
            font-family: 'JetBrains Mono', monospace; font-size: 14px;
        }
        .input-field:focus { outline: 2px solid var(--primary); border-color: transparent; }

        /* --- Specific Tabs --- */
        
        /* Context */
        .file-list { display: flex; flex-direction: column; gap: 8px; }
        .file-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px; border-bottom: 1px solid var(--border);
        }
        .file-item:last-child { border-bottom: none; }
.match-score { font-size: 10px; color: var(--primary); background: rgba(59, 130, 246, 0.1); padding: 2px 6px; border-radius: 4px; margin-left: 8px; }
        
        /* Patcher */
        .json-editor {
            width: 100%; min-height: 200px; background: var(--input-bg);
            border: 1px solid var(--border); color: #d4d4d4;
            font-family: 'JetBrains Mono', monospace; font-size: 13px;
            padding: 12px; border-radius: 12px; resize: none; margin-bottom: 16px;
        }
        .patch-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        
        /* Terminal Output */
        .terminal-logs {
            background: #000; color: #00ff00; font-family: 'JetBrains Mono', monospace;
            font-size: 11px; padding: 12px; border-radius: 12px;
            height: 120px; overflow-y: auto; margin-top: 16px;
            border: 1px solid #333; white-space: pre-wrap;
        }

        /* Preview (Iframe) */
        .preview-container {
            height: calc(100vh - var(--nav-height) - 140px);
            border-radius: 12px; overflow: hidden; border: 1px solid var(--border);
            background: white; position: relative;
        }
        iframe { width: 100%; height: 100%; border: none; }
        .refresh-btn { position: absolute; bottom: 16px; right: 16px; background: rgba(0,0,0,0.8); color: white; border-radius: 50%; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; border: none; cursor: pointer; }

        /* History */
        .version-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 0; border-bottom: 1px solid var(--border);
        }
        .version-item:last-child { border-bottom: none; }
        .v-info strong { display: block; font-size: 15px; }
        .v-info small { color: var(--text-muted); font-size: 12px; }
        .v-badge { padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: bold; text-transform: uppercase; }
        .badge-dev { background: rgba(234, 179, 8, 0.2); color: var(--dev); }
        .badge-prod { background: rgba(34, 197, 94, 0.2); color: var(--prod); }

        /* Settings */
        .settings-footer { margin-top: 30px; text-align: center; color: var(--text-muted); font-size: 12px; }

        /* --- Navigation --- */
        .nav-bar {
            position: fixed; bottom: 0; width: 100%; height: var(--nav-height);
            background: rgba(21, 21, 23, 0.9); backdrop-filter: blur(10px);
            border-top: 1px solid var(--border);
            display: flex; justify-content: space-around; align-items: center;
            padding-bottom: 15px; /* Safe area */
            z-index: 100;
        }
        .nav-item {
            background: none; border: none; color: var(--text-muted);
            display: flex; flex-direction: column; align-items: center; gap: 4px;
            font-size: 10px; font-weight: 500; cursor: pointer;
        }
        .nav-item svg { width: 24px; height: 24px; }
        .nav-item.active { color: var(--primary); }
    </style>
</head>
<body>

    <div class="main-view">
        
        <!-- TAB 1: CONTEXT -->
        <div id="tab-context" class="tab-content active">
            <div class="header">
                Context
                <button class="btn-outline" style="width:auto; padding:8px 12px; font-size:12px;" onclick="fetchFileList()">Refresh</button>
            </div>
            
            <button class="btn btn-primary" onclick="copyContext()">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                Copy File Structure
            </button>
            <p style="color: var(--text-muted); font-size: 13px; margin: 16px 0;">Select files to include in the prompt structure.</p>
            
            <div class="card">
                <input type="text" id="file-search" class="input-field" placeholder="Type to fuzzy search files..." style="margin-bottom: 12px; font-size: 13px; padding: 10px;" onkeyup="filterFiles(this.value)">
<div id="file-list-container" class="file-list">
                    <div style="text-align:center; padding:20px; color:var(--text-muted);">
                        Click "Refresh" to load repo files.
                    </div>
                </div>
            </div>
        </div>

        <!-- TAB 2: PATCHER -->
        <div id="tab-patcher" class="tab-content">
            <div class="header">Patcher</div>
            <textarea id="json-input" class="json-editor" placeholder="Paste JSON patch here..." spellcheck="false">{
  "version": "1.0",
  "operations": [
    {
      "action": "replace_block",
      "file_path": "src/index.js",
      "find_block": "console.log('old')",
      "replace_with": "console.log('new')"
    }
  ]
}</textarea>
            
            <div class="patch-actions">
                <button class="btn btn-dev" onclick="runPatch('patch')">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                    Test (Dev)
                </button>
                <button class="btn btn-prod" onclick="runPatch('commit_prod')">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"></path></svg>
                    Commit Main
                </button>
            </div>

            <!-- Terminal Output -->
            <div id="terminal-output" class="terminal-logs">> Ready for commands...</div>

            <p style="color: var(--text-muted); font-size: 12px; margin-top: 12px; text-align: center;">
                'Test' pushes to <code>conduit-dev</code>. 'Commit' merges to <code>main</code>.
            </p>
        </div>

        <!-- TAB 3: PREVIEW -->
        <div id="tab-preview" class="tab-content">
            <div class="header">
                Preview
                <span style="font-size: 12px; font-weight: 400; color: var(--dev);">● Live</span>
            </div>
            <div class="preview-container">
                <iframe src="" id="preview-frame"></iframe>
                <button class="refresh-btn" onclick="refreshPreview()">
                    <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                </button>
            </div>
            <p id="preview-url-display" style="text-align:center; font-size:10px; color:var(--text-muted); margin-top:10px;">URL not set</p>
        </div>

        <!-- TAB 4: HISTORY -->
        <div id="tab-history" class="tab-content">
            <div class="header">
                Local History
                <button class="btn-outline" style="width:auto; padding:6px 10px; font-size:10px;" onclick="clearHistory()">Clear</button>
            </div>
            <div class="card" id="history-container">
                <!-- History items injected here -->
                <div style="padding:10px; text-align:center; color:var(--text-muted);">No logs yet.</div>
            </div>
        </div>

        <!-- TAB 5: SETTINGS -->
        <div id="tab-settings" class="tab-content">
            <div class="header">Settings</div>
            <div class="card">
                <div class="input-group">
                    <label class="input-label">Supabase Edge Function URL</label>
                    <input type="text" id="setting-func-url" class="input-field" placeholder="https://...supabase.co/functions/v1/ide-brain">
                </div>
                <div class="input-group">
                    <label class="input-label">Web Preview URL</label>
                    <input type="text" id="setting-preview-url" class="input-field" placeholder="https://my-app.vercel.app">
                </div>
                <button class="btn btn-primary" onclick="saveSettings()">Save Configuration</button>
            </div>
            <div class="settings-footer">
                Repo: GetyeTek / IDE<br>
                Conduit Mobile v4.0
            </div>
        </div>

    </div>

    <!-- NAVIGATION -->
    <nav class="nav-bar">
        <button class="nav-item active" onclick="switchTab('tab-context', this)">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
            Context
        </button>
        <button class="nav-item" onclick="switchTab('tab-patcher', this)">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M10 20l4-16m4 4l-4 4-4-4 4-4"></path></svg>
            Patcher
        </button>
        <button class="nav-item" onclick="switchTab('tab-preview', this)">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
            Preview
        </button>
        <button class="nav-item" onclick="switchTab('tab-history', this)">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            History
        </button>
        <button class="nav-item" onclick="switchTab('tab-settings', this)">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
            Settings
        </button>
    </nav>

    <script>
        // --- STATE & CONFIG ---
        const CONFIG = {
            funcUrl: localStorage.getItem('conduit_funcUrl') || '',
            previewUrl: localStorage.getItem('conduit_previewUrl') || ''
        };

        // --- INIT ---
        window.onload = () => {
            // Load settings into inputs
            document.getElementById('setting-func-url').value = CONFIG.funcUrl;
            document.getElementById('setting-preview-url').value = CONFIG.previewUrl;
            
            // Set preview iframe
            if(CONFIG.previewUrl) {
                document.getElementById('preview-frame').src = CONFIG.previewUrl;
                document.getElementById('preview-url-display').textContent = CONFIG.previewUrl;
            }

            // Load History
            renderHistory();

            // Check if setup is needed
            if(!CONFIG.funcUrl) {
                switchTab('tab-settings', document.querySelectorAll('.nav-item')[4]);
                log("Please configure Supabase Function URL in Settings.", "error");
            }
        };

        // --- NAVIGATION ---
        function switchTab(tabId, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            if(btn) btn.classList.add('active');
        }

        // --- SETTINGS ---
        function saveSettings() {
            const funcUrl = document.getElementById('setting-func-url').value.trim();
            const previewUrl = document.getElementById('setting-preview-url').value.trim();

            if(!funcUrl) return alert("Function URL is required");

            localStorage.setItem('conduit_funcUrl', funcUrl);
            localStorage.setItem('conduit_previewUrl', previewUrl);
            
            CONFIG.funcUrl = funcUrl;
            CONFIG.previewUrl = previewUrl;

            alert("Settings Saved!");
            location.reload(); // Reload to apply changes cleanly
        }

        // --- CONTEXT (GITHUB FETCH) ---
                // --- SEARCH ALGORITHMS ---
        function levenshtein(a, b) {
            const matrix = [];
            for (let i = 0; i <= b.length; i++) { matrix[i] = [i]; }
            for (let j = 0; j <= a.length; j++) { matrix[0][j] = j; }
            for (let i = 1; i <= b.length; i++) {
                for (let j = 1; j <= a.length; j++) {
                    if (b.charAt(i - 1) == a.charAt(j - 1)) {
                        matrix[i][j] = matrix[i - 1][j - 1];
                    } else {
                        matrix[i][j] = Math.min(matrix[i - 1][j - 1] + 1, Math.min(matrix[i][j - 1] + 1, matrix[i - 1][j] + 1));
                    }
                }
            }
            return matrix[b.length][a.length];
        }

        function getSimilarity(str, query) {
            if (!query) return 0;
            const distance = levenshtein(str.toLowerCase(), query.toLowerCase());
            const maxLength = Math.max(str.length, query.length);
            return Math.round((1 - distance / maxLength) * 100);
        }

        function filterFiles(query) {
            if (!window.repoFiles) return;
            
            if (!query) {
                renderFileList(window.repoFiles);
                return;
            }

            const scored = window.repoFiles.map(file => {
                const name = file.path.split('/').pop();
                // Give higher weight to filename matches vs full path
                const scoreName = getSimilarity(name, query);
                const scorePath = getSimilarity(file.path, query);
                return { ...file, score: Math.max(scoreName, scorePath) };
            });

            // Filter > 10% match and sort by score
            const filtered = scored.filter(f => f.score > 10).sort((a, b) => b.score - a.score);
            renderFileList(filtered, true);
        }

        function renderFileList(files, showScore = false) {
            const container = document.getElementById('file-list-container');
            container.innerHTML = '';
            if (files.length === 0) {
                container.innerHTML = '<div style="padding:10px; text-align:center; color:var(--text-muted);">No matches found.</div>';
                return;
            }
            files.forEach(file => {
                const div = document.createElement('div');
                div.className = 'file-item';
                const scoreHtml = showScore ? `<span class="match-score">${file.score}% match</span>` : '';
                div.innerHTML = `
                    <div class="v-info">
                        <strong>${file.path.split('/').pop()} ${scoreHtml}</strong>
                        <small>${file.path}</small>
                    </div>
                    <input type="checkbox" class="file-check" value="${file.path}" checked style="accent-color: var(--primary);">
                `;
                container.appendChild(div);
            });
        }
async function fetchFileList() {
            if(!CONFIG.funcUrl) return alert("Configure API URL first");
            
            const listContainer = document.getElementById('file-list-container');
            listContainer.innerHTML = '<div style="padding:10px; text-align:center;">Loading file tree...</div>';

            try {
                const res = await fetch(CONFIG.funcUrl, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ action: 'fetch' })
                });
                
                if(!res.ok) throw new Error("API Error");
                const data = await res.json();
                
                listContainer.innerHTML = ''; // Clear loading
                
                // Store file list in window for Copy Context
                window.repoFiles = data.files || [];

                if(window.repoFiles.length === 0) {
                     listContainer.innerHTML = '<div style="padding:10px;">No files found (or repo empty).</div>';
                     return;
                }

                renderFileList(window.repoFiles);

            } catch (e) {
                listContainer.innerHTML = `<div style="color:var(--danger); padding:10px;">Error: ${e.message}</div>`;
            }
        }

        function copyContext() {
            const checked = Array.from(document.querySelectorAll('.file-check:checked')).map(cb => cb.value);
            if(checked.length === 0) return alert("No files selected");

            const text = `Current Project Structure (Repo: GetyeTek/IDE):\n\nFiles included in context:\n${checked.map(f => `- ${f}`).join('\n')}\n\nPlease generate a JSON patch based on this structure.`;
            
            navigator.clipboard.writeText(text).then(() => {
                alert(`Copied structure of ${checked.length} files to clipboard!`);
            });
        }

        // --- PATCHER ---
        async function runPatch(actionType) {
            if(!CONFIG.funcUrl) return alert("Go to Settings and add Edge Function URL");

            const inputVal = document.getElementById('json-input').value;
            let payload;

            // 1. JSON Validation
            try {
                // Allow simple JSON object or full object with logic
                const parsed = JSON.parse(inputVal);
                if(actionType === 'patch') {
                    // Normalize: If user pasted just an object, wrap it or use it
                    payload = parsed.operations ? parsed.operations : [parsed]; 
                    // Handle case where user pasted array directly
                    if(Array.isArray(parsed)) payload = parsed;
                }
            } catch (e) {
                log("JSON Syntax Error: " + e.message, "error");
                return;
            }

            // 2. Prepare Request
            const reqBody = {
                action: actionType
            };

            if(actionType === 'patch') {
                reqBody.operations = payload;
                log(`Sending ${payload.length} operations to Dev Branch...`);
            } else {
                if(!confirm("Are you sure you want to merge Dev into Main?")) return;
                log("Initiating Merge to Production...");
            }

            // 3. Send
            try {
                const res = await fetch(CONFIG.funcUrl, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(reqBody)
                });

                const data = await res.json();
                
                if(data.error) throw new Error(data.error);

                // 4. Handle Success
                if(actionType === 'patch') {
                    log("✅ Patch Successful!", "success");
                    log(JSON.stringify(data.results, null, 2));
                    addToHistory("Patch Applied", "Dev", `${payload.length} ops`);
                    
                    // Trigger preview refresh automatically
                    setTimeout(refreshPreview, 1000);
                } else {
                    log("🚀 Deployment Complete!", "success");
                    addToHistory("Merged to Main", "Prod", "Stable Release");
                }

            } catch (e) {
                log(`❌ Error: ${e.message}`, "error");
            }
        }

        function log(msg, type) {
            const term = document.getElementById('terminal-output');
            const timestamp = new Date().toLocaleTimeString();
            let color = '#00ff00';
            if(type === 'error') color = '#ef4444';
            if(type === 'success') color = '#22c55e';

            term.innerHTML += `\n<span style="color:${color}">[${timestamp}]</span> ${msg}`;
            term.scrollTop = term.scrollHeight;
        }

        // --- PREVIEW ---
        function refreshPreview() {
            if(!CONFIG.previewUrl) return;
            const iframe = document.getElementById('preview-frame');
            // Add timestamp to force reload
            const url = new URL(CONFIG.previewUrl);
            url.searchParams.set('t', Date.now());
            iframe.src = url.toString();
        }

        // --- HISTORY (Local Storage) ---
        function addToHistory(title, type, meta) {
            const history = JSON.parse(localStorage.getItem('conduit_history') || '[]');
            const entry = { title, type, meta, time: new Date().toLocaleString() };
            history.unshift(entry); // Add to top
            localStorage.setItem('conduit_history', JSON.stringify(history.slice(0, 20))); // Keep last 20
            renderHistory();
        }

        function renderHistory() {
            const history = JSON.parse(localStorage.getItem('conduit_history') || '[]');
            const container = document.getElementById('history-container');
            
            if(history.length === 0) {
                container.innerHTML = '<div style="padding:10px; text-align:center; color:var(--text-muted);">No logs yet.</div>';
                return;
            }

            container.innerHTML = history.map(h => `
                <div class="version-item">
                    <div class="v-info">
                        <strong>${h.title}</strong>
                        <small>${h.time} • ${h.meta}</small>
                    </div>
                    <span class="v-badge ${h.type === 'Prod' ? 'badge-prod' : 'badge-dev'}">${h.type}</span>
                </div>
            `).join('');
        }

        function clearHistory() {
            localStorage.removeItem('conduit_history');
            renderHistory();
        }
    </script>
</body>
</html>
