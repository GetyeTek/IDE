<!DOCTYPE html>
<html lang="en">
<head>
<script src="https://cdn.jsdelivr.net/npm/eruda"></script>
<script>
  eruda.init();
</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Conduit IDE v5</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --card-bg: #151517;
            --input-bg: #0a0a0a;
            --primary: #3b82f6;
            --primary-dim: rgba(59, 130, 246, 0.1);
            --dev: #eab308;
            --prod: #22c55e;
            --danger: #ef4444;
            --text-main: #ffffff;
            --text-muted: #a1a1aa;
            --border: #27272a;
            --nav-height: 80px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            margin: 0; padding: 0; height: 100vh;
            background-color: var(--bg); color: var(--text-main);
            font-family: 'Inter', sans-serif;
            display: flex; flex-direction: column;
            overflow: hidden; /* App-like feel */
        }

        /* --- UTILS --- */
        .hidden { display: none !important; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        .flex-gap { display: flex; gap: 8px; }

        /* --- LAYOUT --- */
        .main-view {
            flex: 1; overflow-y: auto; padding: 20px;
            padding-bottom: calc(var(--nav-height) + 20px);
            scrollbar-width: none; /* Hide scrollbar for cleaner look */
        }
        .main-view::-webkit-scrollbar { display: none; }
        
        .tab-content { display: none; animation: fadeUp 0.2s ease-out; }
        .tab-content.active { display: block; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* --- COMPONENTS --- */
        .header { font-size: 24px; font-weight: 700; margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; }
        
        .card {
            background: var(--card-bg); border: 1px solid var(--border);
            border-radius: 16px; padding: 16px; margin-bottom: 16px;
        }

        .btn {
            width: 100%; padding: 14px; border-radius: 12px; border: none;
            font-weight: 600; font-size: 15px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            color: white; transition: opacity 0.2s;
        }
        .btn:active { opacity: 0.7; }
        .btn-primary { background: var(--primary); }
        .btn-dev { background: var(--dev); color: black; }
        .btn-prod { background: var(--prod); }
        .btn-danger { background: var(--danger); }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-muted); }

        .input-group { margin-bottom: 16px; }
        .input-label { display: block; color: var(--text-muted); font-size: 11px; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        .input-field {
            width: 100%; background: var(--input-bg); border: 1px solid var(--border);
            color: var(--text-main); padding: 12px; border-radius: 10px;
            font-family: 'JetBrains Mono', monospace; font-size: 13px;
        }
        .input-field:focus { outline: 2px solid var(--primary); border-color: transparent; }

        /* --- CONTEXT TAB --- */
        .file-list { display: flex; flex-direction: column; gap: 0; }
        .file-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px; border-bottom: 1px solid var(--border);
        }
        .file-item:last-child { border-bottom: none; }
        .match-score { font-size: 10px; color: var(--primary); background: var(--primary-dim); padding: 2px 6px; border-radius: 4px; margin-left: 6px; }

        /* --- PATCHER & TERMINAL --- */
        .editor-toolbar { display: flex; justify-content: flex-end; gap: 8px; margin-bottom: 8px; }
        .icon-btn { background: var(--card-bg); border: 1px solid var(--border); color: var(--text-muted); padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 12px; display: flex; align-items: center; gap: 5px; }
        .icon-btn:active { background: var(--border); }
        
        .json-editor {
            width: 100%; min-height: 200px; background: var(--input-bg);
            border: 1px solid var(--border); color: #d4d4d4;
            font-family: 'JetBrains Mono', monospace; font-size: 13px; line-height: 1.5;
            padding: 12px; border-radius: 12px; resize: none; margin-bottom: 16px;
        }

        /* NEW TERMINAL UI */
        .terminal-container { margin-top: 24px; display: flex; flex-direction: column; gap: 10px; }
        .terminal-label { font-size: 12px; text-transform: uppercase; color: var(--text-muted); letter-spacing: 1px; margin-bottom: 5px; }
        
        .log-entry {
            border: 1px solid var(--border); border-radius: 8px; overflow: hidden;
            background: #000; font-family: 'JetBrains Mono', monospace;
        }
        .log-header {
            padding: 12px; cursor: pointer; display: flex; align-items: center; justify-content: space-between;
            background: #0f0f11; border-bottom: 1px solid transparent; transition: background 0.2s;
        }
        .log-header:active { background: #1a1a1c; }
        .log-header.expanded { border-bottom-color: var(--border); }
        
        .log-meta { display: flex; align-items: center; gap: 10px; font-size: 12px; }
        .log-time { color: var(--text-muted); }
        .status-pill { padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: bold; text-transform: uppercase; }
        .pill-success { background: rgba(34, 197, 94, 0.2); color: var(--prod); }
        .pill-fail { background: rgba(239, 68, 68, 0.2); color: var(--danger); }
        
        .log-body { display: none; padding: 0; }
        .log-body.open { display: block; }
        
        .op-row {
            padding: 10px 12px; border-bottom: 1px solid #222; font-size: 11px;
            display: flex; flex-direction: column; gap: 4px;
        }
        .op-row:last-child { border-bottom: none; }
        .op-row.row-fail { border-left: 3px solid var(--danger); background: rgba(239, 68, 68, 0.05); }
        .op-title { color: #fff; font-weight: 600; display: flex; justify-content: space-between; }
        .op-details { color: #888; white-space: pre-wrap; margin-top: 2px; }
        .score-badge { font-size: 9px; padding: 1px 4px; border-radius: 3px; border: 1px solid #444; }

        /* --- PREVIEW --- */
        .preview-container {
            height: calc(100vh - var(--nav-height) - 140px);
            border-radius: 12px; overflow: hidden; border: 1px solid var(--border);
            background: white; position: relative;
        }
        iframe { width: 100%; height: 100%; border: none; }
        .refresh-btn { position: absolute; bottom: 16px; right: 16px; background: rgba(0,0,0,0.8); color: white; border-radius: 50%; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; border: none; cursor: pointer; }

        /* Fullscreen Preview */
        body.fs-mode .nav-bar, body.fs-mode .header, body.fs-mode .main-view > p, body.fs-mode .fs-hide { display: none !important; }
        body.fs-mode .main-view { padding: 0 !important; height: 100vh; width: 100vw; overflow: hidden; }
        body.fs-mode #tab-preview { display: block; height: 100%; }
        body.fs-mode .preview-container { height: 100% !important; border: none; border-radius: 0; }
        
        .fs-back-btn { display: none; position: fixed; top: 20px; left: 20px; z-index: 9999; background: rgba(0,0,0,0.8); color: white; border-radius: 50%; width: 44px; height: 44px; align-items: center; justify-content: center; border: 1px solid rgba(255,255,255,0.2); cursor: pointer; backdrop-filter: blur(4px); }
        body.fs-mode .fs-back-btn { display: flex; }

        /* --- NAVIGATION --- */
        .nav-bar {
            position: fixed; bottom: 0; width: 100%; height: var(--nav-height);
            background: rgba(21, 21, 23, 0.9); backdrop-filter: blur(10px);
            border-top: 1px solid var(--border);
            display: flex; justify-content: space-around; align-items: center;
            padding-bottom: 15px; z-index: 100;
        }
        .nav-item {
            background: none; border: none; color: var(--text-muted);
            display: flex; flex-direction: column; align-items: center; gap: 4px;
            font-size: 10px; font-weight: 500; cursor: pointer;
        }
        .nav-item svg { width: 24px; height: 24px; }
        .nav-item.active { color: var(--primary); }
            /* DEMO: Pulse Animation for Commit Button */
        .btn-pulse { animation: pulse-green 2s infinite; }
        @keyframes pulse-green {
            0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); }
            100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }
</style>
</head>

            <div class="flex-gap" style="margin-bottom: 20px;">

                Preview
                <button class="icon-btn" onclick="toggleFullscreen(true)">

                </button>

            <div class="preview-container">

                <button class="refresh-btn" onclick="refreshPreview()">
                    <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                </button>
            </div>
            <p id="preview-url-display" style="text-align:center; font-size:10px; color:var(--text-muted); margin-top:10px;">URL not set</p>
        </div>

        <!-- TAB 4: HISTORY -->
        <div id="tab-history" class="tab-content">
            <div class="header">History</div>
             <div class="card" id="history-container">

            </div>

        <!-- TAB 5: SETTINGS -->
        <div id="tab-settings" class="tab-content">

            <div class="card">

        <button class="nav-item" onclick="switchTab('tab-patcher', this)">

            Preview
        </button>
        <button class="nav-item" onclick="switchTab('tab-history', this)">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            History
        </button>
        <button class="nav-item" onclick="switchTab('tab-settings', this)">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>

    <script>
        // --- CONFIG ---
        const CONFIG = {
            funcUrl: localStorage.getItem('conduit_funcUrl') || '',
            previewUrl: localStorage.getItem('conduit_previewUrl') || ''
        };
        let sessionLogs = []; // In-memory session log

        // --- INIT ---
        window.onload = () => {
            document.getElementById('setting-func-url').value = CONFIG.funcUrl;
            document.getElementById('setting-preview-url').value = CONFIG.previewUrl;
            if(CONFIG.previewUrl) {
                document.getElementById('preview-frame').src = CONFIG.previewUrl;
                document.getElementById('preview-url-display').textContent = CONFIG.previewUrl;
            }
            renderHistory();
            
            // Auto-load Editor state
            const savedJson = localStorage.getItem('conduit_autosave');
            if(savedJson) {
                document.getElementById('json-input').value = savedJson;
                editHistory.push(savedJson);
                historyIndex = 0;
            }

            if(!CONFIG.funcUrl) switchTab('tab-settings', document.querySelectorAll('.nav-item')[4]);
        };

        // --- TAB & UI LOGIC ---
        function switchTab(tabId, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            if(btn) btn.classList.add('active');
        }

        function toggleFullscreen(active) {
            if(active) document.body.classList.add('fs-mode');
            else document.body.classList.remove('fs-mode');
        }

        function saveSettings() {
            const funcUrl = document.getElementById('setting-func-url').value.trim();
            const previewUrl = document.getElementById('setting-preview-url').value.trim();
            if(!funcUrl) return alert("Function URL is required");
            localStorage.setItem('conduit_funcUrl', funcUrl);
            localStorage.setItem('conduit_previewUrl', previewUrl);
            alert("Configuration Saved.");
            location.reload();
        }

        // --- EDITOR (UNDO/REDO) ---
        let editHistory = [];
        let historyIndex = -1;

        function saveState() {
            const val = document.getElementById('json-input').value;
            localStorage.setItem('conduit_autosave', val);
            if (historyIndex === -1 || editHistory[historyIndex] !== val) {
                editHistory = editHistory.slice(0, historyIndex + 1);
                editHistory.push(val);
                historyIndex++;
            }
        }

        function editorUndo() {
            if (historyIndex > 0) {
                historyIndex--;
                document.getElementById('json-input').value = editHistory[historyIndex];
                localStorage.setItem('conduit_autosave', editHistory[historyIndex]);
            }
        }
        function editorRedo() {
            if (historyIndex < editHistory.length - 1) {
                historyIndex++;
                document.getElementById('json-input').value = editHistory[historyIndex];
                localStorage.setItem('conduit_autosave', editHistory[historyIndex]);
            }
        }
        function clearEditor() {
            if(confirm('Clear editor?')) {
                document.getElementById('json-input').value = '';
                saveState();
            }
        }

        // --- FILE CONTEXT & FUZZY SEARCH ---
        async function fetchFileList() {
            if(!CONFIG.funcUrl) return alert("Configure API URL first");
            const listContainer = document.getElementById('file-list-container');
            listContainer.innerHTML = '<div style="padding:20px; text-align:center;">Fetching repo...</div>';
            try {
                const res = await fetch(CONFIG.funcUrl, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ action: 'fetch' })
                });
                if(!res.ok) throw new Error("API Error");
                const data = await res.json();
                window.repoFiles = data.files || [];
                renderFileList(window.repoFiles);
            } catch (e) {
                listContainer.innerHTML = `<div style="color:var(--danger); padding:20px;">Error: ${e.message}</div>`;
            }
        }

        // Levenshtein / Fuzzy
        function levenshtein(a, b) {
            const matrix = [];
            for (let i = 0; i <= b.length; i++) { matrix[i] = [i]; }
            for (let j = 0; j <= a.length; j++) { matrix[0][j] = j; }
            for (let i = 1; i <= b.length; i++) {
                for (let j = 1; j <= a.length; j++) {
                    if (b.charAt(i - 1) == a.charAt(j - 1)) matrix[i][j] = matrix[i - 1][j - 1];
                    else matrix[i][j] = Math.min(matrix[i - 1][j - 1] + 1, Math.min(matrix[i][j - 1] + 1, matrix[i - 1][j] + 1));
                }
            }
            return matrix[b.length][a.length];
        }

        function filterFiles(query) {
            if (!window.repoFiles) return;
            if (!query) return renderFileList(window.repoFiles);

            const scored = window.repoFiles.map(file => {
                const name = file.path.split('/').pop();
                const dist = levenshtein(name.toLowerCase(), query.toLowerCase());
                const maxLen = Math.max(name.length, query.length);
                const score = Math.round((1 - dist / maxLen) * 100);
                return { ...file, score: score };
            });

            // Filter > 20% match and sort
            const filtered = scored.filter(f => f.score > 20).sort((a, b) => b.score - a.score);
            renderFileList(filtered, true);
        }

        function renderFileList(files, showScore = false) {
            const container = document.getElementById('file-list-container');
            container.innerHTML = '';
            if (files.length === 0) return container.innerHTML = '<div style="padding:20px; text-align:center;">No files found.</div>';
            
            files.forEach(file => {
                const div = document.createElement('div');
                div.className = 'file-item';
                const scoreHtml = showScore ? `<span class="match-score">${file.score}%</span>` : '';
                div.innerHTML = `
                    <div class="v-info">
                        <strong>${file.path.split('/').pop()} ${scoreHtml}</strong>

        // Levenshtein / Fuzzy
        function levenshtein(a, b) {
            const matrix = [];
            for (let i = 0; i <= b.length; i++) { matrix[i] = [i]; }
            for (let j = 0; j <= a.length; j++) { matrix[0][j] = j; }
            for (let i = 1; i <= b.length; i++) {
                for (let j = 1; j <= a.length; j++) {
                    if (b.charAt(i - 1) == a.charAt(j - 1)) matrix[i][j] = matrix[i - 1][j - 1];
                    else matrix[i][j] = Math.min(matrix[i - 1][j - 1] + 1, Math.min(matrix[i][j - 1] + 1, matrix[i - 1][j] + 1));
                }
            }
            return matrix[b.length][a.length];
        }

        function filterFiles(query) {
            if (!window.repoFiles) return;
            if (!query) return renderFileList(window.repoFiles);

            const scored = window.repoFiles.map(file => {
                const name = file.path.split('/').pop();
                const dist = levenshtein(name.toLowerCase(), query.toLowerCase());
                const maxLen = Math.max(name.length, query.length);
                const score = Math.round((1 - dist / maxLen) * 100);
                return { ...file, score: score };
            });

            // Filter > 20% match and sort
            const filtered = scored.filter(f => f.score > 20).sort((a, b) => b.score - a.score);
            renderFileList(filtered, true);
        }

        // --- TERMINAL RENDERER ---
        function addTerminalCard(data, options = {}) {
            const container = document.getElementById('terminal-list');
            const id = 'term-' + Date.now();
            
            const div = document.createElement('div');
            div.id = id;
            div.className = 'log-entry';
            
            if(options.loading) {
                div.innerHTML = `<div class="log-header"><span>Processing...</span></div>`;
            } else if (options.error) {
                div.innerHTML = `
                    <div class="log-header" style="color:var(--danger)">
                        <span>Error</span><span class="badge pill-fail">Failed</span>
                    </div>
                    <div class="log-body open" style="padding:12px; color:var(--danger); font-size:11px;">${options.error}</div>
                `;
            }

            container.prepend(div);
            return id;
        }

        function updateTerminalCard(id, response, originalPayload) {
            const el = document.getElementById(id);
            if(!el) return;

            if(response.error) {
                el.innerHTML = `
                    <div class="log-header" style="color:var(--danger)">
                        <span>API Error</span><span class="status-pill pill-fail">500</span>
                    </div>
                    <div class="log-body open" style="padding:12px; color:var(--danger); font-size:11px;">${response.error}</div>
                `;
                return;
            }

            // Calculate Stats
            let failCount = 0;
            let successCount = 0;
            let opHtml = '';

            if(response.results && Array.isArray(response.results)) {
                response.results.forEach(fileRes => {
                    // Group header
                    opHtml += `<div style="background:#111; padding:6px 12px; font-weight:bold; color:#fff; border-bottom:1px solid #222; margin-top:0px;">📄 ${fileRes.file}</div>`;
                    
                    if(fileRes.operations) {
                        fileRes.operations.forEach(op => {
                            if(!op.success) failCount++; else successCount++;
                            
                            // Humanize Action
                            const actionName = op.type.replace(/_/g, ' ').toUpperCase();
                            const isFail = !op.success;
                            
                            // Score Color
                            let scoreColor = '#666';
                            if(op.score >= 95) scoreColor = 'var(--prod)';
                            else if(op.score >= 80) scoreColor = 'var(--dev)';
                            else if(op.score > 0) scoreColor = 'var(--danger)';

                            opHtml += `
                                <div class="op-row ${isFail ? 'row-fail' : ''}">
                                    <div class="op-title">
                                        <span>${actionName}</span>
                                        <span class="score-badge" style="border-color:${scoreColor}; color:${scoreColor}">${op.score}% Match</span>
                                    </div>
                                    <div class="op-details">${op.message}</div>
                                </div>
                            `;
                        });
                    }
                });
            } else if (response.message) {
                // Commit message
                 opHtml = `<div class="op-row"><div class="op-details" style="color:var(--prod)">${response.message}</div></div>`;
            }

            const isFail = failCount > 0;
            const time = new Date().toLocaleTimeString();
            const badgeClass = isFail ? 'pill-fail' : 'pill-success';
            const badgeText = isFail ? `${failCount} FAILED` : 'SUCCESS';

            el.innerHTML = `
                <div class="log-header ${isFail ? 'expanded' : ''}" onclick="toggleLogBody('${id}')">
                    <div class="log-meta">
                        <span class="log-time">${time}</span>
                        <span class="status-pill ${badgeClass}">${badgeText}</span>
                    </div>
                    <div class="flex-gap">
                        <button class="icon-btn" style="padding:2px 6px; height:24px;" onclick="event.stopPropagation(); copyLogData('${id}')">COPY</button>
                        <span style="font-size:10px; color:#666">▼</span>
                    </div>
                </div>
                <div class="log-body ${isFail ? 'open' : ''}" id="${id}-body">
                    ${opHtml}
                </div>
                <!-- Hidden data storage for copy -->
                <textarea id="${id}-data" class="hidden">${JSON.stringify(response, null, 2)}</textarea>
            `;
        }

        function toggleLogBody(id) {
            const body = document.getElementById(id + '-body');
            const header = document.getElementById(id).querySelector('.log-header');
            body.classList.toggle('open');
            header.classList.toggle('expanded');
        }

        function copyLogData(id) {
            const data = document.getElementById(id + '-data').value;
            navigator.clipboard.writeText(data).then(() => alert("Log JSON copied"));
        }

        function refreshPreview() {
            if(!CONFIG.previewUrl) return;
            const iframe = document.getElementById('preview-frame');
            const url = new URL(CONFIG.previewUrl);
            url.searchParams.set('t', Date.now());
            iframe.src = url.toString();
        }

        function renderHistory() {
             const history = JSON.parse(localStorage.getItem('conduit_history') || '[]');
             const container = document.getElementById('history-container');
             if(history.length === 0) return container.innerHTML = '<div style="padding:10px; text-align:center; color:var(--text-muted);">No logs yet.</div>';
             
             container.innerHTML = history.map(h => `
                <div class="version-item">
                    <div class="v-info"><strong>${h.title}</strong><small>${h.time} • ${h.meta}</small></div>
                    <span class="match-score" style="color:${h.type==='Prod'?'var(--prod)':'var(--dev)'}">${h.type}</span>
                </div>
            `).join('');
        }

        function addToHistory(title, type, meta) {
            const history = JSON.parse(localStorage.getItem('conduit_history') || '[]');
            history.unshift({
                title, type, meta, ops, sha, note: '',
                
time: new Date().toLocaleString() });
            localStorage.setItem('conduit_history', JSON.stringify(history.slice(0, 20)));
