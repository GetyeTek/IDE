<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aura | AI Companion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600&display=swap');

        :root {
            --primary: #8b5cf6;
            --secondary: #ec4899;
            --glass: rgba(255, 255, 255, 0.15); /* Thinned out for video visibility */
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #000; /* Dark base for video */
            height: 100vh;
            overflow: hidden;
            margin: 0;
            display: flex;
            justify-content: center;
        }

        /* Video Background Logic */
        .video-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        video {
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            transform: translate(-50%, -50%);
            object-fit: cover;
            /* Removed transition to allow instant frame-perfect swapping */
        }

        .seq-vid {
            opacity: 0;
            transition: opacity 0.3s ease; /* Smooth fade for the initial load */
        }

        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
        }

        .chat-container {
            height: calc(100vh - 180px);
            scrollbar-width: none;
        }
        .chat-container::-webkit-scrollbar { display: none; }

        .message-user {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.8) 0%, rgba(168, 85, 247, 0.8) 100%);
            color: white;
            border-radius: 20px 20px 4px 20px;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.2);
            align-self: flex-end;
            animation: slideInRight 0.3s ease-out;
            backdrop-filter: blur(5px);
        }

        .message-ai {
            background: rgba(255, 255, 255, 0.8);
            color: #1f2937;
            border-radius: 20px 20px 20px 4px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            align-self: flex-start;
            animation: slideInLeft 0.3s ease-out;
        }

        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .sidebar {
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100;
        }

        .sidebar.closed {
            transform: translateX(-100%);
        }

        .input-area {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 25px;
            backdrop-filter: blur(10px);
        }

        #user-input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        #user-input {
            color: white;
        }

        .dot-pulse {
            display: flex;
            gap: 4px;
        }
        .dot {
            width: 8px; height: 8px; background: #fff; border-radius: 50%;
            animation: pulse 1.5s infinite ease-in-out;
        }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes pulse {
            0%, 100% { transform: scale(0.8); opacity: 0.5; }
            50% { transform: scale(1.2); opacity: 1; }
        }

        .toast-msg {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 1px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            z-index: 1000;
            pointer-events: none;
            transition: opacity 0.3s ease, transform 0.3s ease;
            opacity: 0;
        }

        .toast-msg.show {
            opacity: 1;
            transform: translateX(-50%) translateY(-10px);
        }
    </style>
</head>
<body class="antialiased">

    <!-- Video Backgrounds (Infinitely Scalable) -->
    <div class="video-wrapper">
        <video class="seq-vid" muted playsinline preload="auto"><source src="A.mp4" type="video/mp4"></video>
        <video class="seq-vid" muted playsinline preload="auto"><source src="B.mp4" type="video/mp4"></video>
        <video class="seq-vid" muted playsinline preload="auto"><source src="C.mp4" type="video/mp4"></video>
        <video class="seq-vid" muted playsinline preload="auto"><source src="D.mp4" type="video/mp4"></video>
        <video class="seq-vid" muted playsinline preload="auto"><source src="E.mp4" type="video/mp4"></video>
        <video class="seq-vid" muted playsinline preload="auto"><source src="F.mp4" type="video/mp4"></video>
        <video class="seq-vid" muted playsinline preload="auto"><source src="G.mp4" type="video/mp4"></video>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast-msg"></div>

    <!-- Sidebar Overlay -->
    <div id="sidebar-overlay" class="fixed inset-0 bg-black/40 backdrop-blur-sm z-40 hidden" onclick="toggleSidebar()"></div>

    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar closed fixed top-0 left-0 h-full w-80 glass-panel m-2 shadow-2xl z-50 p-6 flex flex-col">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-2xl font-semibold text-white">Settings</h2>
            <button onclick="toggleSidebar()" class="text-white/70 hover:text-white">
                <i class="fa-solid fa-xmark text-xl"></i>
            </button>
        </div>

        <div class="space-y-6 flex-grow overflow-y-auto pr-2 custom-scrollbar">
            <div>
                <label class="block text-sm font-medium text-white/80 mb-2">Gemini API Key</label>
                <input type="text" id="api-key" placeholder="Paste your key here..." 
                    autocomplete="off" spellcheck="false" autocorrect="off"
                    class="w-full p-3 rounded-xl bg-white/10 border border-white/20 text-white focus:ring-2 focus:ring-purple-400 focus:outline-none transition-all">
            </div>

            <div>
                <label class="block text-sm font-medium text-white/80 mb-2">System Instructions</label>
                <textarea id="system-prompt" rows="4" placeholder="Example: You are a caring, witty AI companion named Aura..." 
                    class="w-full p-3 rounded-xl bg-white/10 border border-white/20 text-white focus:ring-2 focus:ring-purple-400 focus:outline-none transition-all resize-none text-sm"></textarea>
            </div>
            
            <div class="p-4 bg-purple-500/20 rounded-2xl border border-purple-400/30">
                <p class="text-xs text-purple-200 font-medium uppercase tracking-wider mb-1">Active Model</p>
                <p class="text-sm text-white font-semibold">Gemini 2.5 Flash</p>
            </div>

            <div class="mt-4">
                <div class="flex justify-between items-center mb-2">
                    <label class="text-sm font-medium text-white/80">Sequence Control</label>
                    <div class="flex gap-2">
                        <button onclick="openJsonModal()" class="text-xs bg-purple-500/20 hover:bg-purple-500/40 px-2 py-1 rounded text-purple-200 border border-purple-400/30">
                            <i class="fa-solid fa-code mr-1"></i>JSON
                        </button>
                        <button onclick="addVideoConfig()" class="text-xs bg-white/10 hover:bg-white/20 px-2 py-1 rounded text-white border border-white/20">
                            <i class="fa-solid fa-plus mr-1"></i>Add
                        </button>
                    </div>
                </div>
                <div id="video-config-list" class="space-y-2 mb-4">
                    <!-- Config items injected here -->
                </div>
            </div>
        </div>

        <div class="pt-6">
            <button onclick="saveSettings()" class="w-full bg-purple-600 text-white py-3 rounded-xl font-semibold hover:bg-purple-700 transition-colors shadow-lg">
                Save & Apply
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="w-full max-w-md h-full flex flex-col p-4 relative z-10">
        
        <!-- Header -->
        <header class="flex justify-between items-center py-4 px-2">
            <button onclick="toggleSidebar()" class="w-10 h-10 flex items-center justify-center rounded-full bg-white/20 hover:bg-white/40 shadow-sm transition-all border border-white/30">
                <i class="fa-solid fa-sliders text-white"></i>
            </button>
            <div class="text-center">
                <h1 class="text-xl font-bold text-white">Aura</h1>
                <span class="text-[10px] text-green-400 font-bold tracking-widest uppercase">Online</span>
            </div>
            <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-purple-400 to-pink-400 border-2 border-white/50 shadow-md"></div>
        </header>

        <!-- Chat Area -->
        <div id="chat-container" class="chat-container flex flex-col space-y-4 p-2 overflow-y-auto pb-10 mt-2">
            <div id="welcome-msg" class="message-ai p-4 max-w-[85%]">
                Hello there. I'm your companion. Open settings to add your API key so we can start talking.
            </div>
        </div>

        <!-- Input Area -->
        <div class="pb-6 pt-2">
            <div class="input-area shadow-xl p-2 flex items-center gap-2">
                <input type="text" id="user-input" placeholder="Whisper something..." 
                    class="flex-grow bg-transparent p-3 focus:outline-none ml-2">
                <button onclick="sendMessage()" id="send-btn" class="bg-purple-600 w-12 h-12 rounded-full flex items-center justify-center text-white shadow-md hover:scale-105 transition-transform active:scale-95">
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </main>

    <!-- JSON Config Modal -->
    <div id="json-modal" class="fixed inset-0 z-[200] hidden flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-md" onclick="closeJsonModal()"></div>
        <div class="glass-panel w-full max-w-2xl p-6 relative flex flex-col gap-4 shadow-2xl border-white/30">
            <div class="flex justify-between items-center">
                <h3 class="text-xl font-bold text-white tracking-tight">Advanced Sequence Config</h3>
                <button onclick="closeJsonModal()" class="text-white/50 hover:text-white"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <p class="text-xs text-white/60 -mt-2">Paste your sequence JSON here. Errors will be caught before applying.</p>
            <textarea id="json-input" class="w-full h-80 bg-black/40 border border-white/10 rounded-xl p-4 text-xs font-mono text-purple-300 focus:ring-2 focus:ring-purple-500 focus:outline-none resize-none" spellcheck="false"></textarea>
            <div class="flex justify-between gap-3">
                <button onclick="formatJson()" class="px-4 py-2 bg-white/10 text-white rounded-lg text-sm hover:bg-white/20 transition-all">Format JSON</button>
                <div class="flex gap-2">
                    <button onclick="closeJsonModal()" class="px-4 py-2 text-white/70 hover:text-white transition-all text-sm">Cancel</button>
                    <button onclick="applyJsonConfig()" class="px-6 py-2 bg-purple-600 text-white rounded-lg text-sm font-bold hover:bg-purple-500 shadow-lg shadow-purple-900/20 transition-all">Apply & Save</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let chatHistory = [];
        const modelName = "gemini-2.5-flash";
        
        let videoConfig = [
            { id: 'A', order: 1, loopsIdle: 0, loopsMsg: 0 },
            { id: 'B', order: 2, loopsIdle: 0, loopsMsg: 0 },
            { id: 'C', order: 3, loopsIdle: -1, loopsMsg: 0 },
            { id: 'D', order: 4, loopsIdle: -1, loopsMsg: 0 },
            { id: 'E', order: 5, loopsIdle: 0, loopsMsg: 0 },
            { id: 'F', order: 6, loopsIdle: 0, loopsMsg: 0 },
            { id: 'G', order: 7, loopsIdle: 0, loopsMsg: 0 }
        ];

        let currentVidIndex = 0;
        let aiResponseQueue = null;
        let activeTypingId = null;
        let firstMessageTime = 0;
        let isFirstMessage = true;
        let messageSentDuringVid = false;
        let currentLoopCount = 0;
        let videoPlayCounts = {}; // Track how many times each video has completed

        const vids = Array.from(document.querySelectorAll('.seq-vid'));

        function initVideoManager() {
            const sorted = [...videoConfig].sort((a, b) => a.order - b.order);
            const firstId = sorted.length > 0 ? sorted[0].id : 'A';
            const firstIndex = getVidIndexById(firstId);

            vids.forEach((vid, i) => {
                // Reset all to hidden
                vid.style.opacity = '0';
                vid.style.zIndex = '1';
                
                vid.addEventListener('ended', () => handleVideoEnded(i));
                vid.addEventListener('timeupdate', function() {
                    if (this.currentTime > 0.1) {
                        vids.forEach((v, idx) => {
                            if(idx !== currentVidIndex) v.style.opacity = '0';
                        });
                        vids[currentVidIndex].style.opacity = '1';
                    }
                });
            });

            // Set the correctly ordered first video as the visible background (Static until first message)
            if (firstIndex !== -1) {
                currentVidIndex = firstIndex;
                vids[firstIndex].style.opacity = '1';
                vids[firstIndex].style.zIndex = '10';
                vids[firstIndex].currentTime = 0; 
                vids[firstIndex].pause(); // Force pause on reload
            }
            renderVideoConfig();
        }

        function showToast(id) {
            const toast = document.getElementById('toast');
            toast.innerText = `VIDEO ${id} ACTIVE`;
            toast.classList.add('show');
            clearTimeout(window.toastTimer);
            window.toastTimer = setTimeout(() => toast.classList.remove('show'), 2000);
        }

        function playVid(index) {
            if (index === -1) return;
            
            const oldIndex = currentVidIndex;
            const currentConf = videoConfig.find(c => getVidIndexById(c.id) === index);
            if (currentConf) showToast(currentConf.id);

            if (oldIndex !== index) {
                currentLoopCount = 0;
                // Flag is reset only when we successfully transition to a NEW video
                messageSentDuringVid = false;
            } else {
                currentLoopCount++;
            }

            currentVidIndex = index;
            vids[index].style.zIndex = '10';
            vids[index].style.opacity = '1';
            vids[index].currentTime = 0;
            
            const playPromise = vids[index].play();
            if (playPromise !== undefined) {
                playPromise.then(() => {
                    if (oldIndex !== index && vids[oldIndex]) {
                        vids[oldIndex].pause();
                        vids[oldIndex].style.opacity = '0';
                    }
                }).catch(e => console.warn("Autoplay prevented"));
            }
        }

        function getVidIndexById(id) {
            return vids.findIndex(v => {
                const source = v.querySelector('source');
                if (!source) return false;
                const src = source.getAttribute('src');
                // Match 'A.mp4' regardless of path
                return src === `${id}.mp4` || src.endsWith(`/${id}.mp4`);
            });
        }

                function handleVideoEnded(index) {
            const currentConf = videoConfig.find(c => getVidIndexById(c.id) === index);
            if (!currentConf) return;

            const isInteracted = (messageSentDuringVid === true);
            const loopsRaw = isInteracted ? currentConf.loopsMsg : currentConf.loopsIdle;
            const extraLoopsLimit = (loopsRaw === -1) ? -1 : parseInt(loopsRaw || 0);

            // 1. Looping Priority
            if (extraLoopsLimit === -1 || currentLoopCount < extraLoopsLimit) {
                playVid(index);
                return;
            }

            // 2. Jump Gate Priority (Supports String, Array, and Signals)
            const rawJump = isInteracted ? currentConf.jumpMsg : currentConf.jumpIdle;
            let targetInstruction = "";

            if (Array.isArray(rawJump) && rawJump.length > 0) {
                const visitCount = videoPlayCounts[currentConf.id] || 0;
                targetInstruction = rawJump[Math.min(visitCount, rawJump.length - 1)];
                videoPlayCounts[currentConf.id] = visitCount + 1;
            } else if (typeof rawJump === 'string' && rawJump.trim() !== "") {
                targetInstruction = rawJump.trim();
            }

            if (targetInstruction) {
                // Split ID from Signal (e.g., "C:reset" -> ["C", "reset"])
                const [targetId, signal] = targetInstruction.split(':');
                const cleanId = targetId.trim().toUpperCase();

                if (signal && signal.toLowerCase() === 'reset') {
                    videoPlayCounts[cleanId] = 0; 
                }

                const jumpIdx = getVidIndexById(cleanId);
                if (jumpIdx !== -1) {
                    playVid(jumpIdx);
                    return;
                }
            }

            // 3. Linear Sequence Fallback
            const sorted = [...videoConfig].sort((a, b) => a.order - b.order);
            const currentPos = sorted.findIndex(c => c.id === currentConf.id);
            const nextConf = sorted[currentPos + 1] || sorted[0];

            if (nextConf) {
                const nextIdx = getVidIndexById(nextConf.id);
                if (nextIdx !== -1) playVid(nextIdx);
            }
        }

        window.onload = () => {
            document.getElementById('api-key').value = localStorage.getItem('aura_api_key') || '';
            document.getElementById('system-prompt').value = localStorage.getItem('aura_system_prompt') || '';
            const savedConfig = localStorage.getItem('aura_video_config');
            if (savedConfig) videoConfig = JSON.parse(savedConfig);
            initVideoManager();
            
            // Save your fingers from typing "Hello" for the 100th time
            document.getElementById('user-input').value = "Hello";
        };

        async function sendMessage() {
            const inputElement = document.getElementById('user-input');
            const text = inputElement.value.trim();
            if (!text) return;

            messageSentDuringVid = true;

            const welcomeMsg = document.getElementById('welcome-msg');
            if (welcomeMsg) welcomeMsg.remove();

            appendMessage('user', text);
            if (text.toLowerCase() !== 'hello') {
                inputElement.value = '';
            }
            
            activeTypingId = appendTypingIndicator();
            
            // Start Sequence based on the LOWEST order defined in settings
            // Ensure the intro sequence teleport ONLY runs exactly once per session
            if (firstMessageTime === 0) {
                firstMessageTime = Date.now();
                const sorted = [...videoConfig].sort((a, b) => a.order - b.order);
                if (sorted.length > 0) {
                    const firstVidIdx = getVidIndexById(sorted[0].id);
                    if (firstVidIdx !== -1) {
                        setTimeout(() => playVid(firstVidIdx), 2000);
                    }
                }
            }

            const currentVid = vids[currentVidIndex];
            // Fixed: Declare isLateSend correctly to prevent global scope leakage
            const isLateSend = (currentVid.duration - currentVid.currentTime) <= 1.0;

            // Logic to handle response timing
            const checkAndDisplay = () => {
                const now = Date.now();
                const elapsedSinceStart = now - firstMessageTime;
                
                if (isFirstMessage) {
                    // First message: Strictly 15 seconds from send
                    if (elapsedSinceStart >= 15000 && aiResponseQueue) {
                        displayAIResponse(aiResponseQueue);
                        aiResponseQueue = null;
                        isFirstMessage = false;
                    } else {
                        setTimeout(checkAndDisplay, 100);
                    }
                } else {
                    // Subsequent messages: Wait for Video G to reach 3s (finding G dynamically)
                    const gIndex = getVidIndexById('G');
                    if (aiResponseQueue && currentVidIndex === gIndex && vids[gIndex].currentTime >= 3.0) {
                        displayAIResponse(aiResponseQueue);
                        aiResponseQueue = null;
                    } else {
                        setTimeout(checkAndDisplay, 100);
                    }
                }
            };

            // Prepare response immediately
            aiResponseQueue = isFirstMessage ? 
                "Hello! I'm Aura. I've finished my intro sequence and waited exactly 15 seconds to speak to you." : 
                "This response was triggered while Video " + (messageSentDuringVid === 3 ? 'D' : 'E') + (isLateSend ? ' was almost over.' : ' was playing.');
            
            checkAndDisplay();
        }

        function displayAIResponse(text) {
            if (activeTypingId) {
                removeTypingIndicator(activeTypingId);
                activeTypingId = null;
            }
            appendMessage('model', text);
            const container = document.getElementById('chat-container');
            container.scrollTop = container.scrollHeight;
        }

        function toggleSidebar() { 
            document.getElementById('sidebar').classList.toggle('closed');
            document.getElementById('sidebar-overlay').classList.toggle('hidden');
        }

        function saveSettings() {
            const btn = event.target.closest('button');
            const originalText = btn.innerText;

            localStorage.setItem('aura_api_key', document.getElementById('api-key').value);
            localStorage.setItem('aura_system_prompt', document.getElementById('system-prompt').value);
            
            const configRows = document.querySelectorAll('.config-row');
            videoConfig = Array.from(configRows).map(row => ({
                id: row.dataset.id,
                order: parseInt(row.querySelector('.order-input').value || 0),
                loopsIdle: parseInt(row.querySelector('.idle-input').value || 0),
                loopsMsg: parseInt(row.querySelector('.msg-input').value || 0),
                jumpIdle: row.querySelector('.jump-idle-input').value.toUpperCase() || "",
                jumpMsg: row.querySelector('.jump-msg-input').value.toUpperCase() || ""
            }));
            
            localStorage.setItem('aura_video_config', JSON.stringify(videoConfig));
            
            // Visual Feedback
            btn.innerText = "Saved!";
            btn.classList.replace('bg-purple-600', 'bg-green-600');
            
            setTimeout(() => {
                btn.innerText = originalText;
                btn.classList.replace('bg-green-600', 'bg-purple-600');
                toggleSidebar();
                renderVideoConfig(); // Refresh UI to match sorted state
            }, 800);
        }

        function updateLoopStatus(id, isChecked) {
            const conf = videoConfig.find(c => c.id === id);
            if (conf) {
                conf.loop = isChecked;
                renderVideoConfig();
            }
        }

        function openJsonModal() {
            const modal = document.getElementById('json-modal');
            const textarea = document.getElementById('json-input');
            textarea.value = JSON.stringify(videoConfig, null, 2);
            modal.classList.remove('hidden');
        }

        function closeJsonModal() {
            document.getElementById('json-modal').classList.add('hidden');
        }

        function formatJson() {
            const textarea = document.getElementById('json-input');
            try {
                const parsed = JSON.parse(textarea.value);
                textarea.value = JSON.stringify(parsed, null, 2);
            } catch (e) {
                alert("Malformed JSON, can't format this mess: " + e.message);
            }
        }

        function applyJsonConfig() {
            const textarea = document.getElementById('json-input');
            try {
                const parsed = JSON.parse(textarea.value);
                if (!Array.isArray(parsed)) throw new Error("Root must be an array");
                
                videoConfig = parsed;
                localStorage.setItem('aura_video_config', JSON.stringify(videoConfig));
                
                renderVideoConfig();
                initVideoManager();
                closeJsonModal();
                showToast("CONFIG APPLIED");
            } catch (e) {
                alert("JSON Error: " + e.message);
            }
        }

        function renderVideoConfig() {
            const list = document.getElementById('video-config-list');
            if (!list) return;
            list.innerHTML = '';
            const sorted = [...videoConfig].sort((a,b) => a.order - b.order);
            sorted.forEach(conf => {
                const div = document.createElement('div');
                div.className = 'config-row flex flex-col gap-3 bg-white/5 p-3 rounded-lg border border-white/10';
                div.dataset.id = conf.id;
                div.innerHTML = `
                    <div class="flex items-center gap-3">
                        <div class="flex flex-col">
                            <span class="text-[9px] text-white/40 uppercase">ID</span>
                            <span class="text-white font-bold">${conf.id}</span>
                        </div>
                        <div class="flex flex-col">
                            <label class="text-[9px] text-white/40 uppercase">Order</label>
                            <input type="number" class="order-input w-10 bg-black/20 border border-white/20 rounded px-1 text-xs text-white" value="${conf.order}">
                        </div>
                        <button onclick="removeVideoConfig('${conf.id}')" class="ml-auto text-red-400 text-xs"><i class="fa-solid fa-trash"></i></button>
                    </div>
                    
                    <div class="space-y-3 border-t border-white/10 pt-3">
                        <div class="grid grid-cols-2 gap-2">
                            <div class="flex flex-col gap-1">
                                <label class="text-[8px] text-purple-300 uppercase font-bold">Idle Logic</label>
                                <div class="flex gap-1">
                                    <input type="number" class="idle-input w-full bg-black/40 text-white text-[10px] rounded border border-white/10 p-1" value="${conf.loopsIdle !== undefined ? conf.loopsIdle : 0}" title="Extra Loops" placeholder="Lp">
                                    <input type="text" class="jump-idle-input w-full bg-black/40 text-white text-[10px] rounded border border-white/10 p-1 uppercase" value="${conf.jumpIdle || ''}" title="Jump Target" placeholder="Jump">
                                </div>
                            </div>
                            <div class="flex flex-col gap-1">
                                <label class="text-[8px] text-pink-300 uppercase font-bold">Message Logic</label>
                                <div class="flex gap-1">
                                    <input type="number" class="msg-input w-full bg-black/40 text-white text-[10px] rounded border border-white/10 p-1" value="${conf.loopsMsg !== undefined ? conf.loopsMsg : 0}" title="Extra Loops" placeholder="Lp">
                                    <input type="text" class="jump-msg-input w-full bg-black/40 text-white text-[10px] rounded border border-white/10 p-1 uppercase" value="${conf.jumpMsg || ''}" title="Jump Target" placeholder="Jump">
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                list.appendChild(div);
            });
        }

        function removeVideoConfig(id) {
            videoConfig = videoConfig.filter(c => c.id !== id);
            renderVideoConfig();
        }

        function addVideoConfig() {
            const name = prompt("Enter Video Name (e.g. H):");
            if (!name) return;
            const nextOrder = videoConfig.length > 0 ? Math.max(...videoConfig.map(c => c.order)) + 1 : 1;
            videoConfig.push({ id: name.toUpperCase(), order: nextOrder, loop: false });
            renderVideoConfig();
        }

        function appendMessage(role, text) {
            const container = document.getElementById('chat-container');
            const div = document.createElement('div');
            div.className = `p-4 max-w-[85%] ${role === 'user' ? 'message-user' : 'message-ai'}`;
            div.innerText = text;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function appendTypingIndicator() {
            const id = 'typing-' + Date.now();
            const container = document.getElementById('chat-container');
            const div = document.createElement('div');
            div.id = id; div.className = 'message-ai p-4 w-20 flex justify-center bg-white/20 backdrop-blur-md';
            div.innerHTML = `<div class="dot-pulse"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
            return id;
        }

        function removeTypingIndicator(id) {
            const el = document.getElementById(id); if (el) el.remove();
        }

        document.getElementById('user-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
    </script>
</body>
</html>
