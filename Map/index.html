<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Map Director Standalone</title>
    <script src="https://unpkg.com/maplibre-gl@3.x/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.x/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        :root {
            --cinematic-black: #050505;
            --accent-color: #00f3ff;
        }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: var(--cinematic-black); font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }

        /* Cinematic Overlays */
        .viewport-frame {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            z-index: 10;
        }

        .bar-top, .bar-bottom {
            height: 12vh;
            background: var(--cinematic-black);
            pointer-events: auto;
            display: flex;
            align-items: center;
            padding: 0 40px;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #subtitle-text {
            width: 100%;
            text-align: center;
            color: white;
            font-size: 1.4rem;
            font-weight: 300;
            letter-spacing: 1px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .controls {
            position: absolute;
            bottom: 14vh;
            left: 50%;
            transform: translateX(-50%);
            pointer-events: auto;
            z-index: 20;
            display: flex;
            gap: 10px;
        }

        button {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 8px 20px;
            cursor: pointer;
            backdrop-filter: blur(5px);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.7rem;
        }

        button:hover { background: var(--accent-color); color: black; }

        #json-input {
            position: absolute;
            top: 14vh;
            right: 20px;
            width: 300px;
            height: 200px;
            background: rgba(0,0,0,0.8);
            color: #00ff00;
            font-family: monospace;
            font-size: 10px;
            border: 1px solid #333;
            padding: 10px;
            pointer-events: auto;
            z-index: 30;
        }
    </style>
</head>
<body>

<div id="map"></div>

<div class="viewport-frame">
    <div class="bar-top"></div>
    <div class="controls">
        <button onclick="director.play()">Run Script</button>
        <button onclick="location.reload()">Reset</button>
    </div>
    <div class="bar-bottom">
        <div id="subtitle-text">Waiting for script...</div>
    </div>
</div>

<textarea id="json-input" placeholder="Paste Movie JSON here..."></textarea>

<script>
/**
 * THE MATERIAL FACTORY
 * Defines visual styles for various annotation types
 */
const MaterialFactory = {
    'neon-line': (id, color = '#00f3ff') => ({
        type: 'line',
        paint: {
            'line-color': color,
            'line-width': 4,
            'line-blur': 3,
            'line-opacity': 0.8
        }
    }),
    'ink-trace': (id, color = '#000000') => ({
        type: 'line',
        paint: {
            'line-color': color,
            'line-width': 2,
            'line-dasharray': [1, 1],
            'line-opacity': 0.9
        }
    }),
    'pulse-point': (id, color = '#ff4400') => ({
        type: 'circle',
        paint: {
            'circle-radius': 10,
            'circle-color': color,
            'circle-stroke-width': 2,
            'circle-stroke-color': '#fff'
        }
    })
};

/**
 * THE DIRECTOR ENGINE
 * Handles camera, timing, and visual execution
 */
class MapDirector {
    constructor() {
        this.map = new maplibregl.Map({
            container: 'map',
            style: {
                version: 8,
                sources: {
                    'satellite': {
                        type: 'raster',
                        tiles: ['https://services.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'],
                        tileSize: 256
                    }
                },
                layers: [{ id: 'sat-layer', type: 'raster', source: 'satellite' }]
            },
            center: [0, 0],
            zoom: 2
        });
        this.script = [];
    }

    async play() {
        const input = document.getElementById('json-input').value;
        try {
            this.script = JSON.parse(input);
            for (const scene of this.script) {
                await this.executeScene(scene);
            }
        } catch (e) {
            alert("JSON Error: " + e.message);
        }
    }

    executeScene(scene) {
        return new Promise((resolve) => {
            console.log("Executing scene:", scene.subtitle);
            
            // 1. Update Subtitles
            document.getElementById('subtitle-text').innerText = scene.subtitle || "";

            // 2. Camera Movement
            if (scene.camera) {
                this.map.flyTo({
                    ...scene.camera,
                    duration: scene.duration || 2000,
                    essential: true
                });
            }

            // 3. Drawing Actions
            if (scene.action === 'draw' && scene.material) {
                this.addAnnotation(scene);
            }

            setTimeout(resolve, (scene.duration || 2000) + (scene.wait || 500));
        });
    }

    addAnnotation(scene) {
        const id = 'layer-' + Math.random().toString(36).substr(2, 9);
        const materialConfig = MaterialFactory[scene.material](id, scene.color);

        this.map.addSource(id, {
            type: 'geojson',
            data: {
                type: 'Feature',
                geometry: { type: scene.geometryType || 'LineString', coordinates: scene.coordinates }
            }
        });

        this.map.addLayer({
            id: id,
            source: id,
            ...materialConfig
        });
    }
}

const director = new MapDirector();

// Default Sample Script
const sampleScript = [
    {
        subtitle: "Our story begins in the Himalayas...",
        camera: { center: [86.9250, 27.9881], zoom: 12, pitch: 60, bearing: 0 },
        duration: 4000
    },
    {
        subtitle: "Tracing the dangerous path to the summit.",
        action: "draw",
        material: "neon-line",
        color: "#ff0055",
        geometryType: "LineString",
        coordinates: [
            [86.9250, 27.9881], [86.9350, 27.9981], [86.9450, 28.0081]
        ],
        camera: { center: [86.9450, 28.0081], zoom: 14, pitch: 70, bearing: 45 },
        duration: 3000
    }
];
document.getElementById('json-input').value = JSON.stringify(sampleScript, null, 2);

</script>
</body>
</html>
