<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Director Studio | Ultimate</title>
    <script src="https://unpkg.com/maplibre-gl@3.x/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.x/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        :root {
            --bg: #050505; --accent: #3b82f6; --glass: rgba(15, 15, 18, 0.85);
        }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: var(--bg); font-family: 'Inter', sans-serif; color: white; }
        
        /* Map & Filters */
        #map-container { position: absolute; width: 100%; height: 100%; transition: filter 1s ease; }
        #map { width: 100%; height: 100%; }

        /* Atmospheric Filter Presets */
        .filter-night { filter: brightness(0.6) sepia(1) hue-rotate(100deg) contrast(1.2); }
        .filter-blueprint { filter: invert(1) hue-rotate(180deg) brightness(0.8) contrast(1.5); }
        .filter-vhs { filter: contrast(1.1) saturate(1.2) sepia(0.2); animation: vhs-flicker 0.1s infinite; }
        @keyframes vhs-flicker { 0% { opacity: 0.99; } 50% { opacity: 1; } 100% { opacity: 0.98; } }

        /* Studio UI */
        .studio-ui { position: relative; z-index: 100; pointer-events: none; width: 100%; height: 100%; display: flex; }
        .sidebar {
            width: 380px; height: 100%; background: var(--glass); backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255,255,255,0.1); pointer-events: auto; display: flex; flex-direction: column;
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .sidebar.hidden { transform: translateX(-100%); }

        .editor-container { flex: 1; padding: 20px; display: flex; flex-direction: column; }
        #json-input {
            flex: 1; background: rgba(0,0,0,0.5); border: 1px solid #333; border-radius: 8px;
            color: #00ffaa; font-family: 'Fira Code', monospace; font-size: 11px; padding: 15px; outline: none; transition: 0.3s;
        }
        #json-input:focus { border-color: var(--accent); }

        /* Cinematic HUD */
        .hud { position: absolute; bottom: 0; width: 100%; height: 180px; display: flex; flex-direction: column; align-items: center; justify-content: center; background: linear-gradient(to top, rgba(0,0,0,0.95), transparent); }
        #subtitle { font-size: 1.8rem; font-weight: 300; text-align: center; max-width: 900px; text-shadow: 0 4px 10px rgba(0,0,0,0.5); opacity: 0; transition: 0.8s; }
        #subtitle.active { opacity: 1; }
        
        .controls-row { margin-top: 30px; display: flex; gap: 15px; pointer-events: auto; }
        .btn { background: white; color: black; border: none; padding: 12px 30px; border-radius: 5px; font-weight: 700; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; font-size: 11px; transition: 0.3s; }
        .btn:hover { background: var(--accent); color: white; transform: scale(1.05); }
        .btn-ghost { background: transparent; color: white; border: 1px solid rgba(255,255,255,0.3); }
    </style>
</head>
<body>

<div id="map-container">
    <div id="map"></div>
</div>

<div class="studio-ui">
    <aside class="sidebar" id="studio-sidebar">
        <div style="padding: 25px; border-bottom: 1px solid rgba(255,255,255,0.1);">
            <h2 style="margin:0; font-size: 1.1rem;">DIRECTOR STUDIO <span style="color:var(--accent)">PRO</span></h2>
            <p style="font-size: 0.7rem; opacity: 0.5; margin: 5px 0 0 0;">Generic Map Movie Engine v3.0</p>
        </div>
        <div class="editor-container">
            <label style="font-size: 10px; opacity: 0.6; margin-bottom: 8px; font-weight: 800;">MOVIE SCRIPT (JSON)</label>
            <textarea id="json-input" spellcheck="false"></textarea>
        </div>
        <div style="padding: 20px;">
            <button class="btn" style="width:100%" onclick="director.play()">▶ Run Experience</button>
        </div>
    </aside>

    <div class="hud">
        <div id="subtitle"></div>
        <div class="controls-row">
            <button class="btn btn-ghost" onclick="location.reload()">Reset</button>
            <button class="btn btn-ghost" onclick="toggleSidebar()">Studio Editor</button>
            <button class="btn btn-ghost" onclick="director.toggleTerrain()">3D Terrain</button>
        </div>
    </div>
</div>

<script>
    function toggleSidebar() {
        document.getElementById('studio-sidebar').classList.toggle('hidden');
    }

    class MapDirector {
        constructor() {
            this.map = new maplibregl.Map({
                container: 'map',
                style: {
                    version: 8,
                    sources: {
                        'sat': { type: 'raster', tiles: ['https://services.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'], tileSize: 256 },
                        'terrain': { type: 'raster-dem', url: 'https://demotiles.maplibre.org/terrain-tiles/tiles.json', tileSize: 256 }
                    },
                    layers: [{ id: 'sat', type: 'raster', source: 'sat' }],
                    terrain: { source: 'terrain', exaggeration: 1.5 }
                },
                center: [0, 20], zoom: 2, pitch: 45
            });
            
            this.isTerrainOn = true;
            this.narrator = window.speechSynthesis;
        }

        toggleTerrain() {
            this.isTerrainOn = !this.isTerrainOn;
            this.map.setTerrain(this.isTerrainOn ? { source: 'terrain', exaggeration: 1.5 } : null);
        }

        async play() {
            const sidebar = document.getElementById('studio-sidebar');
            if(!sidebar.classList.contains('hidden')) toggleSidebar();

            try {
                const script = JSON.parse(document.getElementById('json-input').value);
                for (const scene of script) {
                    await this.executeScene(scene);
                }
            } catch (e) { alert("Script Error: " + e.message); }
        }

        async executeScene(scene) {
            return new Promise((resolve) => {
                // 1. Atmosphere Filter
                const container = document.getElementById('map-container');
                container.className = scene.filter ? `filter-${scene.filter}` : '';

                // 2. Subtitles & Narration
                const sub = document.getElementById('subtitle');
                sub.innerText = scene.subtitle || '';
                sub.classList.toggle('active', !!scene.subtitle);
                
                if (scene.narrate && scene.subtitle) {
                    const utterance = new SpeechSynthesisUtterance(scene.subtitle);
                    utterance.rate = 0.9;
                    this.narrator.speak(utterance);
                }

                // 3. Camera (Normal Fly vs Orbit vs Shake)
                if (scene.camera) {
                    if (scene.camera.type === 'orbit') {
                        this.startOrbit(scene.camera, scene.duration);
                    } else {
                        this.map.flyTo({
                            ...scene.camera,
                            duration: scene.duration || 3000,
                            essential: true
                        });
                    }
                    if (scene.camera.shake) this.startShake(scene.camera.shake, scene.duration);
                }

                // 4. Drawing (Animated Trace)
                if (scene.action === 'draw') {
                    this.animateTrace(scene);
                }

                setTimeout(resolve, (scene.duration || 3000) + (scene.wait || 500));
            });
        }

        startOrbit(config, duration) {
            let start = null;
            const animate = (time) => {
                if (!start) start = time;
                const progress = time - start;
                this.map.setBearing((progress / 100) % 360);
                if (progress < duration) requestAnimationFrame(animate);
            };
            requestAnimationFrame(animate);
        }

        startShake(intensity, duration) {
            const canvas = this.map.getCanvas();
            const start = Date.now();
            const interval = setInterval(() => {
                const elapsed = Date.now() - start;
                if (elapsed > duration) {
                    canvas.style.transform = '';
                    clearInterval(interval);
                    return;
                }
                const x = (Math.random() - 0.5) * intensity;
                const y = (Math.random() - 0.5) * intensity;
                canvas.style.transform = `translate(${x}px, ${y}px)`;
            }, 50);
        }

        animateTrace(scene) {
            const id = 'trace-' + Math.random().toString(36).substr(2, 5);
            this.map.addSource(id, {
                type: 'geojson',
                data: { type: 'Feature', geometry: { type: 'LineString', coordinates: [scene.coordinates[0]] } }
            });

            this.map.addLayer({
                id: id,
                source: id,
                type: 'line',
                paint: {
                    'line-color': scene.color || '#3b82f6',
                    'line-width': 5,
                    'line-blur': 2
                }
            });

            let step = 0;
            const draw = () => {
                if (step >= scene.coordinates.length) return;
                const currentCoords = scene.coordinates.slice(0, step + 1);
                this.map.getSource(id).setData({
                    type: 'Feature',
                    geometry: { type: 'LineString', coordinates: currentCoords }
                });
                step++;
                if (step < scene.coordinates.length) setTimeout(() => requestAnimationFrame(draw), (scene.duration / scene.coordinates.length));
            };
            draw();
        }
    }

    const director = new MapDirector();

    // ULTIMATE DEMO SCRIPT
    const demo = [
        {
            subtitle: "PHASE 1: NIGHT SURVEILLANCE OVER THE ALPS",
            filter: "night",
            narrate: true,
            camera: { center: [7.708, 45.927], zoom: 12, pitch: 70, bearing: 0 },
            duration: 5000
        },
        {
            subtitle: "DETECTION: INK TRACE ACTIVE",
            filter: "blueprint",
            narrate: true,
            action: "draw",
            color: "#00ffaa",
            coordinates: [[7.708, 45.927], [7.72, 45.94], [7.74, 45.93], [7.76, 45.95]],
            camera: { type: "orbit", center: [7.708, 45.927] },
            duration: 6000
        },
        {
            subtitle: "ATMOSPHERIC DISTURBANCE DETECTED",
            filter: "vhs",
            narrate: true,
            camera: { center: [7.76, 45.95], zoom: 14, pitch: 80, shake: 10 },
            duration: 4000
        }
    ];
    document.getElementById('json-input').value = JSON.stringify(demo, null, 4);
</script>
</body>
</html>
