<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Game</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            transition: background-color 0.3s, color 0.3s;
        }
        body.light-theme {
            background-color: #f0f0f0;
            color: #333;
        }
        body.dark-theme {
            background-color: #282c34;
            color: #f8f8f2;
        }
        .game-container {
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.3);
            transition: background-color 0.3s, border-color 0.3s;
        }
        body.light-theme .game-container {
            border: 2px solid #ccc;
            background-color: #fff;
        }
        body.dark-theme .game-container {
            border: 2px solid #555;
            background-color: #3c404a;
        }
        #game-board {
            display: grid;
            grid-template-columns: repeat(4, 100px);
            grid-template-rows: repeat(4, 100px);
            gap: 10px;
            margin-bottom: 20px;
        }
        .card {
            width: 100px;
            height: 100px;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2em;
            cursor: pointer;
            transition: transform 0.3s ease-in-out, background-color 0.3s;
            transform-style: preserve-3d;
            position: relative;
        }
        body.light-theme .card {
            background-color: #4CAF50; /* Green for unflipped light */
        }
        body.dark-theme .card {
            background-color: #61afef; /* Blue for unflipped dark */
        }
        .card.flipped {
            transform: rotateY(180deg);
        }
        body.light-theme .card.flipped {
            background-color: #ddd; /* Flipped light */
        }
        body.dark-theme .card.flipped {
            background-color: #4b5263; /* Flipped dark */
        }
        .card .front, .card .back {
            position: absolute;
            backface-visibility: hidden;
        }
        .card .front {
            transform: rotateY(180deg);
        }
        body.light-theme .card .front {
            color: #333;
        }
        body.dark-theme .card .front {
            color: #f8f8f2;
        }
        .card .back {
            font-weight: bold;
        }
        body.light-theme .card .back {
            color: white; /* Question mark color light */
        }
        body.dark-theme .card .back {
            color: #f8f8f2; /* Question mark color dark */
        }
        .card.matched {
            cursor: default;
        }
        body.light-theme .card.matched {
            background-color: #bbb; /* Matched light */
        }
        body.dark-theme .card.matched {
            background-color: #7f8497; /* Matched dark */
        }
        .controls {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        button {
            padding: 10px 20px;
            font-size: 1em;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            transition: background-color 0.3s, color 0.3s;
        }
        body.light-theme button {
            background-color: #007bff;
            color: white;
        }
        body.light-theme button:hover {
            background-color: #0056b3;
        }
        body.dark-theme button {
            background-color: #56b6c2;
            color: #282c34;
        }
        body.dark-theme button:hover {
            background-color: #45a0ac;
        }
        #message {
            margin-top: 10px;
            font-size: 1.2em;
            font-weight: bold;
        }
        body.light-theme #message {
            color: #333;
        }
        body.dark-theme #message {
            color: #e06c75;
        }
        .stats {
            margin-top: 10px;
            font-size: 1.1em;
        }
        body.light-theme .stats {
            color: #555;
        }
        body.dark-theme .stats {
            color: #abb2bf;
        }
</head>
<body>
    <div class="game-container">
        <h1>Memory Game</h1>
        <div id="game-board"></div>
        <div class="stats">
            Moves: <span id="moves">0</span>
            Time: <span id="time">0s</span>
        </div>
        <div id="message"></div>
        <div class="controls">
            <button id="restart-button">Restart Game</button>
        </div>
    </div>

    <script>
        const gameBoard = document.getElementById('game-board');
        const movesSpan = document.getElementById('moves');
        const timeSpan = document.getElementById('time');
        const messageDiv = document.getElementById('message');
        const restartButton = document.getElementById('restart-button');

        const symbols = ['ð', 'ð', 'ð', 'ð', 'ð', 'ð', 'ð', 'ð'];
        let cards = [];
        let flippedCards = [];
        let matchedPairs = 0;
        let moves = 0;
        let timer = null;
        let seconds = 0;
        let isProcessingFlip = false;

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function createBoard() {
            cards = [];
            const gameSymbols = shuffle([...symbols, ...symbols]); // Duplicate and shuffle for pairs
            gameBoard.innerHTML = '';
            gameSymbols.forEach((symbol, index) => {
                const card = document.createElement('div');
                card.classList.add('card');
                card.dataset.symbol = symbol;
                card.dataset.index = index; // Unique index for each card element

                const front = document.createElement('div');
                front.classList.add('front');
                front.textContent = symbol;

                const back = document.createElement('div');
                back.classList.add('back');
                back.textContent = '?'; // Placeholder for unflipped card

                card.appendChild(back);
                card.appendChild(front);

                card.addEventListener('click', () => flipCard(card));
                gameBoard.appendChild(card);
                cards.push(card);
            });
        }

        function flipCard(card) {
            if (isProcessingFlip || card.classList.contains('flipped') || card.classList.contains('matched') || flippedCards.length === 2) {
                return;
            }

            if (timer === null) {
                startTimer();
            }

            card.classList.add('flipped');
            flippedCards.push(card);

            if (flippedCards.length === 2) {
                moves++;
                movesSpan.textContent = moves;
                isProcessingFlip = true;
                setTimeout(checkForMatch, 1000); // Give player time to see both cards
            }
        }

        function checkForMatch() {
            const [card1, card2] = flippedCards;
            if (card1.dataset.symbol === card2.dataset.symbol) {
                card1.classList.add('matched');
                card2.classList.add('matched');
                matchedPairs++;
                if (matchedPairs === symbols.length) {
                    endGame(true);
                }
            } else {
                card1.classList.remove('flipped');
                card2.classList.remove('flipped');
            }
            flippedCards = [];
            isProcessingFlip = false;
        }

        function startTimer() {
            seconds = 0;
            timeSpan.textContent = '0s';
            timer = setInterval(() => {
                seconds++;
                timeSpan.textContent = `${seconds}s`;
            }, 1000);
        }

        function stopTimer() {
            clearInterval(timer);
            timer = null;
        }

        function resetGame() {
            stopTimer();
            flippedCards = [];
            matchedPairs = 0;
            moves = 0;
            seconds = 0;
            isProcessingFlip = false;
            movesSpan.textContent = '0';
            timeSpan.textContent = '0s';
            messageDiv.textContent = '';
            createBoard();
        }

        function endGame(won) {
            stopTimer();
            if (won) {
                messageDiv.textContent = `Congratulations! You matched all pairs in ${moves} moves and ${seconds} seconds!`;
            }
        }

        restartButton.addEventListener('click', resetGame);

        // Initial game setup
        resetGame();
    </script>
</body>
</html>
