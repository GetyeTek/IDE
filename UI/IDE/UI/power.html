<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cortex UI - Shutdown Sequence</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Handlee&display=swap" rel="stylesheet">
    <style>
        :root {
            --icon-1-s: 54px; --icon-1-x: -1px; --icon-1-y: -44px;
            --icon-2-s: 59px; --icon-2-x: -2px; --icon-2-y: -48px;
            --icon-3-s: 61px; --icon-3-x: -2px; --icon-3-y: -54px;
            --side-key-v: 0;
            --side-key-y: 95px;
            --side-key-x: 1px;
            --side-key-w: 170px;
            --glass-blur: 0px;
            --glass-op: 0;
            --nav-size: 28px;
            --nav-spacing: 45px;

            --text-white: #ffffff;
            --pill-bg: rgba(255, 255, 255, 0.12);
            --nav-bg: #000000;
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            touch-action: manipulation; 
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: transparent; color: var(--text-white);
            font-family: "Segoe UI", "Roboto", sans-serif;
            overflow: hidden;
            transition: background-color 0.5s ease;
        }

        .wallpaper-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; 
            background: rgba(0, 0, 0, var(--glass-op));
            backdrop-filter: blur(var(--glass-blur)); 
            -webkit-backdrop-filter: blur(var(--glass-blur));
            transition: background 0.4s ease;
        }

        .wallpaper-overlay.active-state {
            background: #000000;
            z-index: 5;
        }

        .ui-container {
            position: relative; z-index: 10; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        .icon-grid {
            display: grid; 
            grid-template-columns: 160px; 
            grid-template-rows: repeat(3, 130px);    
            gap: 10px;
            width: fit-content;
            margin-bottom: 40px;
        }

        .icon-item { 
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 2;
        }

        .icon-grid.active-state .icon-item:not(.active) {
            opacity: 0;
            pointer-events: none;
            transform: scale(0.6);
        }

        .icon-item.active { z-index: 100; }
        
        .icon-item.active:nth-child(1) { transform: translateY(140px) scale(1.4); }
        .icon-item.active:nth-child(2) { transform: translateY(0px) scale(1.4); }
        .icon-item.active:nth-child(3) { transform: translateY(-140px) scale(1.4); }

        .icon-item.active .icon-svg { transform: translate(0, 0) !important; }

        .icon-svg { 
            position: absolute;
            cursor: pointer;
            z-index: 2;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.1s ease;
        }

        #svg-1 { width: var(--icon-1-s); height: var(--icon-1-s); transform: translate(var(--icon-1-x), var(--icon-1-y)); }
        #svg-2 { width: var(--icon-2-s); height: var(--icon-2-s); transform: translate(var(--icon-2-x), var(--icon-2-y)); }
        #svg-3 { width: var(--icon-3-s); height: var(--icon-3-s); transform: translate(var(--icon-3-x), var(--icon-3-y)); }

        .side-key-btn {
            position: absolute; 
            bottom: var(--side-key-y); 
            left: calc(50% + var(--side-key-x)); 
            transform: translateX(-50%);
            background: var(--pill-bg); 
            width: var(--side-key-w);
            height: 44px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 25px;
            font-size: 14.5px; border: 0.5px solid rgba(255,255,255,0.08);
            opacity: var(--side-key-v);
            white-space: nowrap;
            pointer-events: none;
        }

        .nav-bar {
            position: fixed; bottom: 0; width: 100%; height: 48px;
            background: var(--nav-bg); display: flex;
            justify-content: space-between; align-items: center;
            padding: 0 var(--nav-spacing);
            z-index: 20;
        }
        
        .nav-icon { 
            fill: none; stroke: #ffffff; stroke-width: 1.5; 
            width: var(--nav-size); height: var(--nav-size); 
            opacity: 0.9; 
        }

        /* The Crisp Screenshot Overlay */
        #power-off-img {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100vw;
            height: auto;
            z-index: 1000;
        }

        .instruction-text {
            position: absolute;
            top: calc(50% + 92px);
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Handlee', cursive;
            color: #ffffff;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            z-index: 50;
        }

        .action-label {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 2px;
        }

        .action-desc {
            font-size: 16px;
            opacity: 0.9;
        }
    </style>
</head>
<body id="cortex-body">

    <div class="wallpaper-overlay"></div>

    <!-- PRE-LOADED CRISP IMAGE -->
    <img id="power-off-img" src="power_off.png" alt="Shutdown Screen">

    <div class="ui-container" id="main-wrap">
        <div id="desc-container" class="instruction-text">
            <div id="action-label" class="action-label"></div>
            <div id="action-desc" class="action-desc"></div>
        </div>
        <div class="icon-grid" id="icon-grid">
            <div class="icon-item" onclick="handleAction('power', this)">
                <svg id="svg-1" class="icon-svg" viewBox="0 0 1024 1024">
                    <defs><clipPath id="sq"><path d="M 512,0 C 114,0 0,114 0,512 0,910 114,1024 512,1024 910,1024 1024,910 1024,512 1024,114 910,0 512,0 Z" /></clipPath></defs>
                    <rect width="1024" height="1024" fill="#3D3D3D" clip-path="url(#sq)" />
                    <g fill="none" stroke="white" stroke-width="84" stroke-linecap="round"><line x1="512" y1="245" x2="512" y2="445" /><path d="M 648,312 A 255,255 0 1 1 376,312" /></g>
                </svg>
            </div>

            <div class="icon-item" onclick="handleAction('restart', this)">
                <svg id="svg-2" class="icon-svg" viewBox="0 0 1024 1024">
                    <rect width="1024" height="1024" fill="#0BB062" clip-path="url(#sq)" />
                    <g fill="none" stroke="white" stroke-width="72" stroke-linecap="butt" stroke-linejoin="round">
                        <line x1="512" y1="240" x2="512" y2="440" stroke-linecap="square" />
                        <path d="M 585,275 A 240,240 0 1 1 350,715" />
                        <path d="M 440,275 A 240,240 0 0 0 375,315" /><path d="M 325,365 A 240,240 0 0 0 285,435" /><path d="M 270,495 A 240,240 0 0 0 272,565" />
                        <path d="M 365,630 L 260,725 L 365,820" stroke-linecap="square" />
                    </g>
                    <polygon points="260,689 260,761 320,725" fill="white" />
                </svg>
            </div>

            <div class="icon-item" onclick="handleAction('emergency', this)">
                <svg id="svg-3" class="icon-svg" viewBox="0 0 1024 1024">
                    <rect width="1024" height="1024" fill="#DE3526" clip-path="url(#sq)" />
                    <path d="M 246,737 L 778,737 L 778,688 L 714,688 L 666,310 C 658,280 640,270 610,270 L 414,270 C 384,270 366,280 358,310 L 310,688 L 246,688 Z" fill="white" />
                    <rect x="488" y="365" width="48" height="185" rx="4" fill="#DE3526" />
                    <circle cx="512" cy="622" r="32" fill="#DE3526" />
                </svg>
            </div>
        </div>
        <div class="side-key-btn">Side key settings</div>
    </div>

    <div class="nav-bar">
        <svg class="nav-icon" viewBox="0 0 24 24"><path d="M7,6V18M12,6V18M17,6V18" /></svg>
        <svg class="nav-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="7.5" /></svg>
        <svg class="nav-icon" viewBox="0 0 24 24" style="stroke-width: 1.4px;"><path d="M9 9 L6 12 L9 15" /><path d="M6 12 H14 C 18.5 12, 20 10.5, 20 7 V 4.5" /></svg>
    </div>

    <script>
        const grid = document.getElementById('icon-grid');
        const overlay = document.querySelector('.wallpaper-overlay');
        const items = document.querySelectorAll('.icon-item');
        const mainWrap = document.getElementById('main-wrap');
        const navBar = document.querySelector('.nav-bar');
        const powerOffImg = document.getElementById('power-off-img');

        mainWrap.addEventListener('click', function(e) {
            if (e.target === this || e.target.id === 'main-wrap') {
                if (grid.classList.contains('active-state')) {
                    // If 1 button is focused, just go back to the 3-button list
                    resetUI();
                } else {
                    // If in main screen, issue system back and close
                    if (window.Cortex) {
                        Cortex.nav('BACK');
                        setTimeout(() => { Cortex.close(); }, 200);
                    }
                }
            }
        });

        function handleAction(type, element) {
            const label = document.getElementById('action-label');
            const desc = document.getElementById('action-desc');
            const container = document.getElementById('desc-container');

            if (element.classList.contains('active')) {
                if (type === 'power') {
                    element.style.opacity = "0.5";
                    mainWrap.style.pointerEvents = "none";
                    
                    setTimeout(() => {
                        // 1. Show the Crisp Screenshot instantly
                        mainWrap.style.display = 'none';
                        navBar.style.display = 'none';
                        document.body.style.backgroundColor = 'black';
                        powerOffImg.style.display = 'block';
                        
                        // 2. Wait 3 seconds with the screenshot visible
                        setTimeout(() => {
                            // Hide image (screen goes pure black)
                            powerOffImg.style.display = 'none';

                            if (window.Cortex) {
                                // Transition to "Off" state, apply 20% stealth dimming
                                if (Cortex.setDim) Cortex.setDim(20);
                                if (Cortex.reportPowerState) Cortex.reportPowerState("FAKE_OFF");
                                
                                // FORCE PHYSICAL LOCK
                                if (Cortex.lock) Cortex.lock();

                                // 3. The Death Rumble (5000ms after the screen locks)
                                // 3. The Death Rumble (5000ms after the screen locks)
                                setTimeout(() => {
                                    if (Cortex.vibrate) Cortex.vibrate(600);
                                }, 5000);
                            }

                        }, 3000);
                    }, 2000);
                } else {
                    if (window.Cortex && window.Cortex.sendAction) window.Cortex.sendAction(type);
                    resetUI();
                }
            } else {
                items.forEach(el => el.classList.remove('active'));
                element.classList.add('active');
                grid.classList.add('active-state');
                overlay.classList.add('active-state');

                // Show instruction text
                if (type === 'power') {
                    label.innerText = 'Power off';
                    desc.innerText = 'Tap again to turn off your phone';
                } else if (type === 'restart') {
                    label.innerText = 'Restart';
                    desc.innerText = 'Tap again to restart your phone';
                } else if (type === 'emergency') {
                    label.innerText = 'Emergency mode';
                    desc.innerText = 'Tap again to turn on Emergency mode';
                }
                container.style.opacity = '1';
            }
        }

        function resetUI() {
            const container = document.getElementById('desc-container');
            items.forEach(el => { el.classList.remove('active'); el.style.opacity = "1"; });
            grid.classList.remove('active-state');
            overlay.classList.remove('active-state');
            mainWrap.style.pointerEvents = "auto";
            container.style.opacity = '0';
        }
    </script>
</body>
</html>
