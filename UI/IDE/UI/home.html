<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CORTEX OS</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.1);
            --border: rgba(255, 255, 255, 0.1);
            --text: #ffffff;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #000; color: var(--text);
            overflow: hidden;
        }

        .wallpaper {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://cortex.local/wallpaper.jpg');
            background-size: cover; background-position: center;
            z-index: -1; filter: brightness(0.6);
        }

        /* MASTER WRAPPER */
        .stage {
            position: relative; width: 100vw; height: 100vh;
            perspective: 1000px;
        }

        .view-screen {
            position: absolute; top: 0; left: 0;
            width: 100vw; height: 100vh;
            display: flex; flex-direction: column;
            /* FORCE GPU LAYER PROMOTION */
            backface-visibility: hidden;
            perspective: 1000px;
            will-change: transform, opacity;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), 
                        opacity 0.3s ease-out;
        }

        /* --- SCREEN 1: HOME --- */
        #home-screen {
            z-index: 1;
            opacity: 1;
            transform: translate3d(0, 0, 0);
        }
        
        body.drawer-active #home-screen {
            transform: translate3d(0, -20vh, 0); 
            opacity: 0;
            pointer-events: none;
        }

        .home-content {
            flex: 1; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            text-align: center; cursor: pointer;
        }
        #main-clock { 
            font-size: 2.8rem;
            font-weight: 300; 
            text-shadow: 0 2px 15px rgba(0,0,0,0.3); 
            margin-bottom: 2px; 
        }
        #main-date { 
            font-size: 0.85rem; 
            opacity: 0.7; 
            text-transform: uppercase; 
            letter-spacing: 1.5px; 
        }

        .dock {
            height: 100px; width: 100%;
            display: flex; justify-content: space-evenly; align-items: center;
            padding: 0 30px 20px 30px;
        }

        /* --- SCREEN 2: DRAWER --- */
        #drawer-screen {
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            transform: translate3d(0, 10vh, 0);
            background: rgba(0,0,0,0.4);
            /* Lower blur for smoother rendering during movement */
            backdrop-filter: blur(8px);
        }
        
        body.drawer-active #drawer-screen {
            opacity: 1;
            pointer-events: auto;
            transform: translate3d(0, 0, 0);
        }

        .search-wrapper { padding: 40px 25px 5px 25px; }
        .search-bar {
            height: 48px; background: rgba(50, 50, 50, 0.8);
            backdrop-filter: blur(20px); border-radius: 40px;
            display: flex; align-items: center; padding: 0 18px; gap: 12px;
        }
        #search-input { flex: 1; background: transparent; border: none; color: #eee; font-size: 0.95rem; outline: none; }

        .pager {
            flex: 1; display: flex; overflow-x: auto;
            scroll-snap-type: x mandatory; scrollbar-width: none;
        }
        .pager::-webkit-scrollbar { display: none; }

        .grid-page {
            min-width: 100vw; height: 100%;
            scroll-snap-align: start; scroll-snap-stop: always;
            display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(6, 1fr);
            padding: 5px 15px 25px 15px; row-gap: 12px; column-gap: 5px;
        }

        .app-item { display: flex; flex-direction: column; align-items: center; text-align: center; cursor: pointer; }
        .app-item:active { transform: scale(0.9); opacity: 0.6; }
        .app-icon {
            width: 48px; height: 48px; border-radius: 50%;
            margin-bottom: 5px; object-fit: cover;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.4));
            background: rgba(255,255,255,0.05);
        }
        .app-label {
            font-size: 0.65rem; width: 90%; line-height: 1.1;
            max-height: 2.2em; display: -webkit-box; -webkit-line-clamp: 2;
            -webkit-box-orient: vertical; overflow: hidden;
            color: #ddd;
        }

        .pagination-dots { height: 25px; display: flex; justify-content: center; align-items: center; gap: 6px; padding-bottom: 5px; }
        .dot { width: 4px; height: 4px; background: #fff; border-radius: 50%; opacity: 0.2; }
        .dot.active { opacity: 0.9; }
    </style>
</head>
<body>

    <div class="wallpaper"></div>

    <div class="stage">
        <!-- SCREEN 1: HOME -->
        <div class="view-screen" id="home-screen">
            <div class="home-content" onclick="launchClock()">
                <div id="main-clock">00:00</div>
                <div id="main-date">...</div>
            </div>
            <div class="dock" id="main-dock"></div>
        </div>

        <!-- SCREEN 2: DRAWER -->
        <div class="view-screen" id="drawer-screen">
            <div class="search-wrapper"><div class="search-bar"><input type="text" id="search-input" placeholder="Search" oninput="handleSearch()"></div></div>
            <div class="pager" id="pager" onscroll="updateDots()"></div>
            <div class="pagination-dots" id="dots"></div>
        </div>
    </div>

    <script>
        let allApps = [];
        const DOCK_PKGS = ['dialer', 'messaging', 'chrome', 'telegram'];
        let startY = 0;

        function updateTime() {
            const now = new Date();
            document.getElementById('main-clock').innerText = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: true });
            document.getElementById('main-date').innerText = now.toLocaleDateString([], { weekday: 'long', month: 'long', day: 'numeric' });
        }

        function launchClock() {
            const clockApp = allApps.find(a => a.pkg.toLowerCase().includes('clock') || a.pkg.toLowerCase().includes('deskclock'));
            if (clockApp) CortexLauncher.launch(clockApp.pkg);
        }

        function renderAll(appsList) {
            const dockApps = [];
            DOCK_PKGS.forEach(hint => {
                const match = appsList.find(a => a.pkg.toLowerCase().includes(hint));
                if (match && !dockApps.find(d => d.pkg === match.pkg)) dockApps.push(match);
            });
            document.getElementById('main-dock').innerHTML = dockApps.slice(0, 4).map(app => `
                <div class="app-item" onclick="CortexLauncher.launch('${app.pkg}')">
                    <img class="app-icon" src="${app.icon}">
                </div>
            `).join('');

            const pager = document.getElementById('pager');
            const dots = document.getElementById('dots');
            pager.innerHTML = ''; dots.innerHTML = '';

            for (let i = 0; i < appsList.length; i += 24) {
                const chunk = appsList.slice(i, i + 24);
                const page = document.createElement('div');
                page.className = 'grid-page';
                page.innerHTML = chunk.map(app => `
                    <div class="app-item" onclick="CortexLauncher.launch('${app.pkg}')">
                        <img class="app-icon" src="${app.icon}" loading="lazy">
                        <div class="app-label">${app.name}</div>
                    </div>
                `).join('');
                pager.appendChild(page);
                const dot = document.createElement('div');
                dot.className = 'dot' + (i === 0 ? ' active' : '');
                dots.appendChild(dot);
            }
        }

        function updateDots() {
            const pager = document.getElementById('pager');
            const dots = document.querySelectorAll('.dot');
            const idx = Math.round(pager.scrollLeft / window.innerWidth);
            dots.forEach((d, i) => d.classList.toggle('active', i === idx));
        }

        function handleSearch() {
            const query = document.getElementById('search-input').value.toLowerCase();
            renderAll(allApps.filter(a => a.name.toLowerCase().includes(query)));
        }

        // GESTURE ENGINE
        window.addEventListener('touchstart', e => { startY = e.touches[0].clientY; });
        window.addEventListener('touchend', e => {
            const endY = e.changedTouches[0].clientY;
            const diff = startY - endY;
            const isActive = document.body.classList.contains('drawer-active');

            if (!isActive && diff > 50) {
                document.body.classList.add('drawer-active');
            } else if (isActive && Math.abs(diff) > 50) {
                document.body.classList.remove('drawer-active');
            }
        });

        window.showHomeScreen = () => {
            document.body.classList.remove('drawer-active');
        };

        window.onload = () => {
            try {
                const raw = CortexLauncher.getAppList();
                allApps = JSON.parse(raw).sort((a,b) => a.name.localeCompare(b.name));
                renderAll(allApps);
                setInterval(updateTime, 1000); updateTime();
            } catch (e) { }
        };
    </script>
</body>
</html>
