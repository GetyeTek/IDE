<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CORTEX OS</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.1);
            --border: rgba(255, 255, 255, 0.2);
            --text: #ffffff;
            --accent: #00f3ff;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            background-color: #000;
            color: var(--text);
        }

        /* The Intercepted Wallpaper */
        .wallpaper {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://cortex.local/wallpaper.jpg');
            background-size: cover;
            background-position: center;
            z-index: -1;
            transform: scale(1.1);
            filter: brightness(0.8) blur(2px);
        }

        .container {
            display: flex; flex-direction: column; height: 100%;
            padding: 20px; padding-top: 40px;
        }

        .header { text-align: center; margin-bottom: 30px; }
        #clock { font-size: 4rem; font-weight: 200; text-shadow: 0 0 20px rgba(0,0,0,0.5); }
        #date { font-size: 1rem; opacity: 0.8; letter-spacing: 2px; text-transform: uppercase; }

        .search-container { margin-bottom: 20px; }
        #search-input {
            width: 100%; padding: 15px; border-radius: 15px;
            border: 1px solid var(--border); background: var(--glass);
            backdrop-filter: blur(10px); color: #fff; outline: none;
            font-size: 1rem; transition: 0.3s;
        }
        #search-input:focus { border-color: var(--accent); box-shadow: 0 0 15px rgba(0,243,255,0.2); }

        .app-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            overflow-y: auto;
            flex-grow: 1;
            padding-bottom: 100px;
            /* Hide scrollbar for Chrome/Safari */
            -ms-overflow-style: none; scrollbar-width: none;
        }
        .app-grid::-webkit-scrollbar { display: none; }

        .app-item {
            display: flex; flex-direction: column; align-items: center;
            text-align: center; cursor: pointer; transition: 0.2s;
        }
        .app-item:active { transform: scale(0.85); opacity: 0.7; }

        .app-icon {
            width: 60px; height: 60px;
            border-radius: 14px;
            margin-bottom: 8px;
            background: var(--glass);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            object-fit: contain;
        }

        .app-label {
            font-size: 0.7rem; width: 100%;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }

        .bottom-bar {
            position: fixed; bottom: 20px; left: 20px; right: 20px;
            display: flex; justify-content: center; gap: 10px;
        }

        .btn {
            background: var(--glass); border: 1px solid var(--border);
            color: #fff; padding: 10px 20px; border-radius: 10px;
            backdrop-filter: blur(10px); font-size: 0.8rem; letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="wallpaper"></div>

    <div class="container">
        <div class="header">
            <div id="clock">00:00</div>
            <div id="date">LOADING OS...</div>
        </div>

        <div class="search-container">
            <input type="text" id="search-input" placeholder="Search applications..." oninput="filterApps()">
        </div>

        <div class="app-grid" id="app-list">
            <!-- Apps injected here -->
        </div>
    </div>

    <div class="bottom-bar">
        <button class="btn" onclick="CortexLauncher.close()">EXIT CORTEX</button>
        <button class="btn" onclick="renderApps()">REFRESH</button>
    </div>

    <script>
        let allApps = [];

        function updateTime() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
            document.getElementById('date').innerText = now.toLocaleDateString([], { weekday: 'long', month: 'long', day: 'numeric' });
        }

        function renderApps() {
            try {
                const raw = CortexLauncher.getAppList();
                allApps = JSON.parse(raw);
                allApps.sort((a, b) => a.name.localeCompare(b.name));
                displayApps(allApps);
                CortexLauncher.log("Launcher UI: Successfully rendered " + allApps.length + " apps.");
            } catch (e) {
                document.getElementById('app-list').innerHTML = `<div style="grid-column: span 4">BRIDGE_ERROR: ${e.message}</div>`;
            }
        }

        function displayApps(apps) {
            const container = document.getElementById('app-list');
            container.innerHTML = apps.map(app => `
                <div class="app-item" onclick="CortexLauncher.launch('${app.pkg}')">
                    <img class="app-icon" src="${app.icon}" loading="lazy">
                    <div class="app-label">${app.name}</div>
                </div>
            `).join('');
        }

        function filterApps() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const filtered = allApps.filter(a => a.name.toLowerCase().includes(query));
            displayApps(filtered);
        }

        // Initialize
        setInterval(updateTime, 1000);
        updateTime();
        
        window.onload = () => {
            renderApps();
            // Subtle fade in
            document.body.style.opacity = '0';
            setTimeout(() => {
                document.body.style.transition = 'opacity 1s';
                document.body.style.opacity = '1';
            }, 100);
        };
    </script>
</body>
</html>
