<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CORTEX OS</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.12);
            --border: rgba(255, 255, 255, 0.1);
            --text: #ffffff;
            --accent: #00f3ff;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            background-color: #000;
            color: var(--text);
        }

        .wallpaper {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://cortex.local/wallpaper.jpg');
            background-size: cover;
            background-position: center;
            z-index: -1;
            filter: brightness(0.6);
        }

        .main-container {
            display: flex; flex-direction: column;
            height: 100%; width: 100%;
            padding-top: 15px;
        }

        /* Screenshot-matched Search Bar */
        .search-wrapper {
            padding: 10px 20px;
            width: 100%;
        }
        .search-bar {
            height: 54px;
            background: rgba(60, 60, 60, 0.8);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 15px;
        }
        #search-input {
            flex: 1;
            background: transparent;
            border: none;
            color: #ccc;
            font-size: 1.1rem;
            outline: none;
        }
        .search-menu-dots {
            color: #888;
            font-size: 1.4rem;
            letter-spacing: -2px;
            margin-bottom: 8px;
        }

        /* Horizontal Pagination Pager */
        .pager {
            flex: 1;
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .pager::-webkit-scrollbar { display: none; }

        /* 6x4 Grid Page */
        .grid-page {
            min-width: 100vw;
            width: 100vw;
            height: 100%;
            scroll-snap-align: start;
            scroll-snap-stop: always; /* FORCES stop at each page, preventing multi-page skips */
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(6, 1fr);
            padding: 5px 15px 30px 15px;
            row-gap: 15px;
            column-gap: 5px;
        }

        .app-item {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; text-align: center; cursor: pointer;
            transition: transform 0.1s;
            height: 100%;
        }
        .app-item:active { transform: scale(0.9); opacity: 0.6; }

        .app-icon {
            width: 48px; height: 48px; 
            border-radius: 50%; /* Perfect circle */
            margin-bottom: 6px;
            object-fit: cover; /* Crops non-standard icons to fit the circle */
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.4));
            background: rgba(255,255,255,0.05); /* Silhouette backup for transparent icons */
        }

        .app-label {
            font-size: 0.75rem;
            width: 85%;
            line-height: 1.1;
            max-height: 2.2em;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-shadow: 0 1px 3px rgba(0,0,0,0.8);
            font-weight: 400;
            color: #eee;
        }

        /* Pagination Indicators */
        .pagination-dots {
            height: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            padding-bottom: 10px;
        }
        .dot {
            width: 6px; height: 6px;
            background: #fff;
            border-radius: 50%;
            opacity: 0.3;
            transition: opacity 0.3s, transform 0.3s;
        }
        .dot.active {
            opacity: 1;
            transform: scale(1.2);
        }

        .exit-btn {
            position: fixed; bottom: 20px; right: 20px;
            background: var(--glass); border: 1px solid var(--border);
            color: #fff; width: 40px; height: 40px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.8rem; opacity: 0.3;
        }
    </style>
</head>
<body>

    <div class="wallpaper"></div>

    <div class="main-container">
        <div class="search-wrapper">
            <div class="search-bar">
                <input type="text" id="search-input" placeholder="Search" oninput="handleSearch()">
                <div class="search-menu-dots">...</div>
            </div>
        </div>

        <div class="pager" id="pager" onscroll="updateDots()">
            <!-- Grid pages injected here -->
        </div>

        <div class="pagination-dots" id="dots">
            <!-- Dots injected here -->
        </div>
    </div>

    <div class="exit-btn" onclick="CortexLauncher.close()">×</div>

    <script>
        let allApps = [];
        const APPS_PER_PAGE = 24;

        function renderLauncher(appsList) {
            const pager = document.getElementById('pager');
            const dots = document.getElementById('dots');
            pager.innerHTML = '';
            dots.innerHTML = '';

            // Split apps into pages of 24 (6x4 grid)
            for (let i = 0; i < appsList.length; i += APPS_PER_PAGE) {
                const chunk = appsList.slice(i, i + APPS_PER_PAGE);
                const pageDiv = document.createElement('div');
                pageDiv.className = 'grid-page';
                
                pageDiv.innerHTML = chunk.map(app => `
                    <div class="app-item" onclick="CortexLauncher.launch('${app.pkg}')">
                        <img class="app-icon" src="${app.icon}" loading="lazy">
                        <div class="app-label">${app.name}</div>
                    </div>
                `).join('');
                
                pager.appendChild(pageDiv);

                const dot = document.createElement('div');
                dot.className = 'dot' + (i === 0 ? ' active' : '');
                dots.appendChild(dot);
            }
        }

        function updateDots() {
            const pager = document.getElementById('pager');
            const dots = document.querySelectorAll('.dot');
            const pageIndex = Math.round(pager.scrollLeft / window.innerWidth);
            
            dots.forEach((dot, i) => {
                dot.classList.toggle('active', i === pageIndex);
            });
        }

        function handleSearch() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const filtered = allApps.filter(a => a.name.toLowerCase().includes(query));
            renderLauncher(filtered);
        }

        window.onload = () => {
            try {
                const raw = CortexLauncher.getAppList();
                allApps = JSON.parse(raw);
                allApps.sort((a, b) => a.name.localeCompare(b.name));
                renderLauncher(allApps);
            } catch (e) {
                CortexLauncher.log("Init Error: " + e.message);
            }
        };
    </script>
</body>
</html>
